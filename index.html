<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario Mama</title>
    <style>
    :root { --hoy-bg: #FFEB3B; --manana-bg: #1A237E; }
    body, html { margin: 0; padding: 0; height: 100%; font-family: 'Arial Black', Gadget, sans-serif; overflow: hidden; background: #000; }
    
    .container { display: flex; height: 100vh; width: 100vw; }
    
    .col { 
        width: 50%; 
        padding: 10px; 
        display: flex; 
        flex-direction: column; 
        box-sizing: border-box;
        height: 100vh;
    }

    .col-hoy { background-color: var(--hoy-bg); color: #000; border-right: 4px solid #000; }
    .col-manana { background-color: var(--manana-bg); color: #FFF; }

    h1 { font-size: 4vh; margin: 5px 0; text-align: center; text-transform: uppercase; }
    
    .btn-repaso { 
        width: 100%; 
        padding: 15px; 
        font-size: 2.5vh; 
        font-weight: bold; 
        border-radius: 15px; 
        border: 3px solid #000; 
        margin-bottom: 10px;
        background: #fff;
        cursor: pointer;
    }

    /* Contenedor flexible para eventos */
    .lista-eventos { 
        flex-grow: 1; 
        display: flex;
        flex-direction: column;
        gap: 10px;
        overflow: hidden; /* Evitamos el scroll para que el auto-ajuste trabaje */
    }

    .evento { 
        background: white; 
        color: #000; 
        padding: 10px 15px; 
        border-radius: 15px; 
        border: 3px solid #333; 
        display: flex;
        flex-direction: column;
        justify-content: center;
        flex-shrink: 1; /* Permite que se encojan */
        min-height: 0;
    }

    /* El tamaño de estos se ajustará por JS */
    .evento h2 { margin: 0; color: #d32f2f; line-height: 1; }
    .evento p { margin: 2px 0 0; font-weight: bold; line-height: 1.1; }
    
    .urgente { border: 6px solid #ff0000; animation: blinker 1.5s linear infinite; }
    @keyframes blinker { 50% { border-color: transparent; } }
</style>
</head>
<body>

<div class="container">
    <div class="col col-hoy">
        <h1 id="txt-hoy">HOY</h1>
        <button class="btn-repaso" onclick="repasarDia('hoy')">🔊 ESCUCHAR TODO HOY</button>
        <div id="lista-hoy" class="lista-eventos"></div>
    </div>

    <div class="col col-manana">
        <h1 id="txt-manana">MAÑANA</h1>
        <button class="btn-repaso" onclick="repasarDia('manana')" style="border-color: #FFF;">🔊 ESCUCHAR TODO MAÑANA</button>
        <div id="lista-manana" class="lista-eventos"></div>
    </div>
</div>


   // --- const API_KEY = 'AIzaSyAtAuM4-eUL5JxWJTTfvOfIeSoohUzY0uQ'; 
   // --- const CALENDAR_ID = '28451d471eac1ddfffe0b11721d46c8850993884a38c3cd8e0df6506848d8ae3@group.calendar.google.com';

<script>
    const API_KEY = 'AIzaSyAtAuM4-eUL5JxWJTTfvOfIeSoohUzY0uQ'; 
    const CALENDAR_ID = '28451d471eac1ddfffe0b11721d46c8850993884a38c3cd8e0df6506848d8ae3@group.calendar.google.com';

    let eventosHoy = [];
    let eventosManana = [];

    function limpiarTexto(t) {
        return t.replace(/\*/g, '').replace(/\[ALERTA\]/gi, '').trim();
    }

    function horaNatural(fecha) {
        let h = fecha.getHours();
        let m = fecha.getMinutes();
        let period = h >= 12 ? 'de la tarde' : 'de la mañana';
        if (h > 12) h -= 12;
        if (h === 0) h = 12;
        let mins = m === 0 ? "" : " y " + m;
        return h + mins + " " + period;
    }

    function horaVisualSinPeriodo(fecha) {
        let h = fecha.getHours();
        let m = fecha.getMinutes();
        if (h > 12) h -= 12;
        if (h === 0) h = 12;
        let mm = m < 10 ? '0' + m : m;
        return h + ':' + mm; // Sin AM/PM
    }

    async function cargarCalendario() {
        const min = new Date(); min.setHours(0,0,0,0);
        const max = new Date(); max.setDate(min.getDate() + 2);
        const url = `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(CALENDAR_ID)}/events?key=${API_KEY}&timeMin=${min.toISOString()}&singleEvents=true&orderBy=startTime`;

        try {
            const r = await fetch(url);
            const d = await r.json();
            if(d.items) organizarEventos(d.items);
        } catch (e) { console.error(e); }
    }

    function organizarEventos(items) {
        const hoyStr = new Date().toLocaleDateString();
        eventosHoy = []; eventosManana = [];

        items.forEach(item => {
            const inicio = new Date(item.start.dateTime || item.start.date);
            const ev = {
                titulo: limpiarTexto(item.summary || "Sin título"),
                horaV: horaVisualSinPeriodo(inicio),
                horaVoz: horaNatural(inicio),
                obj: inicio,
                esAlerta: (item.summary || "").includes("*")
            };
            if (inicio.toLocaleDateString() === hoyStr) eventosHoy.push(ev);
            else eventosManana.push(ev);
        });
        dibujarYEscalar();
    }

    function dibujarYEscalar() {
        const opc = { weekday: 'long', day: 'numeric', month: 'long' };
        const d = new Date();
        document.getElementById('txt-hoy').innerText = "HOY: " + d.toLocaleDateString('es-ES', opc);
        d.setDate(d.getDate() + 1);
        document.getElementById('txt-manana').innerText = "MAÑANA: " + d.toLocaleDateString('es-ES', opc);

        renderLista(eventosHoy, 'lista-hoy');
        renderLista(eventosManana, 'lista-manana');

        // Ajustar tamaño de letra tras renderizar
        ajustarTexto('lista-hoy');
        ajustarTexto('lista-manana');
    }

    function renderLista(lista, id) {
        const cont = document.getElementById(id);
        cont.innerHTML = "";
        lista.forEach(ev => {
            const div = document.createElement('div');
            div.className = "evento " + (ev.esAlerta ? 'urgente' : '');
            div.onclick = () => hablar(`A las ${ev.horaVoz}, ${ev.titulo}`);
            div.innerHTML = `<h2>${ev.horaV}</h2><p>${ev.titulo}</p>`;
            cont.appendChild(div);
        });
    }

    function ajustarTexto(idContenedor) {
        const cont = document.getElementById(idContenedor);
        const eventos = cont.getElementsByClassName('evento');
        if (eventos.length === 0) return;

        let fontSize = 4; // Empezamos con 4vh
        let maxHeight = cont.clientHeight;

        // Bucle para reducir la letra hasta que el scroll desaparezca
        while (cont.scrollHeight > maxHeight && fontSize > 1.5) {
            fontSize -= 0.1;
            for (let ev of eventos) {
                ev.querySelector('h2').style.fontSize = (fontSize * 0.8) + "vh";
                ev.querySelector('p').style.fontSize = fontSize + "vh";
            }
        }
    }

    function hablar(t) {
        window.speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(t);
        m.lang = 'es-ES';
        m.rate = 0.8;
        window.speechSynthesis.speak(m);
    }

    function repasarDia(dia) {
        const lista = dia === 'hoy' ? eventosHoy : eventosManana;
        if (lista.length === 0) return hablar("No tienes nada anotado.");
        let t = (dia === 'hoy' ? "Hoy tienes: " : "Mañana tienes: ");
        lista.forEach(ev => { t += `A las ${ev.horaVoz}, ${ev.titulo}. `; });
        hablar(t);
    }

    // Alertas cada minuto
  // --- NUEVA LÓGICA DE ALARMA CON CAMPANA Y REPETICIÓN ---

// Función para el sonido de campana (usamos un tono sintético de alta frecuencia)
function sonarCampana(callback) {
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const duracionSegundos = 15;
    const oscilador = audioCtx.createOscillator();
    const ganancia = audioCtx.createGain();

    oscilador.type = 'sine'; // Tono suave tipo campana
    oscilador.frequency.setValueAtTime(880, audioCtx.currentTime); // Nota La (A5)
    
    // Hace que el sonido "pulse" cada segundo para que parezca una campana real
    for (let i = 0; i < duracionSegundos; i++) {
        ganancia.gain.setValueAtTime(0.5, audioCtx.currentTime + i);
        ganancia.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i + 0.8);
    }

    oscilador.connect(ganancia);
    ganancia.connect(audioCtx.destination);

    oscilador.start();
    oscilador.stop(audioCtx.currentTime + duracionSegundos);

    // Cuando terminen los 15 segundos de campana, empezamos a hablar
    setTimeout(callback, duracionSegundos * 1000);
}

// Función para hablar con repetición triple
function hablarTriple(mensaje) {
    let contador = 0;
    
    function ejecutarLectura() {
        if (contador < 3) {
            const frase = new SpeechSynthesisUtterance(mensaje);
            frase.lang = 'es-ES';
            frase.rate = 0.8;
            
            // Al terminar una lectura, esperamos 2 segundos y repetimos
            frase.onend = () => {
                contador++;
                setTimeout(ejecutarLectura, 2000); 
            };
            
            window.speechSynthesis.speak(frase);
        }
    }
    ejecutarLectura();
}

// Intervalo de comprobación cada minuto
setInterval(() => {
    const ahora = new Date();
    eventosHoy.forEach(ev => {
        // Si el evento tiene asterisco y es el minuto exacto
        if (ev.esAlerta && 
            ev.obj.getHours() === ahora.getHours() && 
            ev.obj.getMinutes() === ahora.getMinutes() && 
            ahora.getSeconds() < 2) {
            
            // 1. Primero suena la campana 15 segundos
            // 2. Luego lee el mensaje 3 veces
            sonarCampana(() => {
                hablarTriple(`Atención mamá. Es hora de: ${ev.titulo}`);
            });
        }
    });
}, 1000);
</script>
</body>
</html>
