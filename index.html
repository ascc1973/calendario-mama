<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">

    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22Calendario%20Mama%22,%22short_name%22:%22Calendario%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%23000000%22,%22theme_color%22:%22%23000000%22}">

    <title>Calendario Mamá</title>
    
    <style>
        :root { --hoy-bg: #FFEB3B; --manana-bg: #1A237E; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Arial Black', Gadget, sans-serif; overflow: hidden; background: #000; }
        .container { display: flex; height: 100vh; width: 100vw; flex-direction: row; }
        .col { width: 50%; padding: 8px; display: flex; flex-direction: column; box-sizing: border-box; height: 100vh; }
        .col-hoy { background-color: var(--hoy-bg); color: #000; border-right: 4px solid #000; }
        .col-manana { background-color: var(--manana-bg); color: #FFF; }
        h1 { font-size: 2.2vh; margin: 4px 0; text-align: center; text-transform: uppercase; white-space: nowrap; overflow: hidden; }
        .btn-repaso { width: 100%; padding: 10px 2px; font-size: 1.8vh; font-weight: bold; border-radius: 10px; border: 2px solid #000; margin-bottom: 8px; background: #fff; color: #000; flex-shrink: 0; text-transform: uppercase; }
        .lista-eventos { flex-grow: 1; display: flex; flex-direction: column; gap: 6px; overflow: hidden; }
        .evento { background: white; color: #000; padding: 6px; border-radius: 12px; border: 3px solid #333; display: flex; flex-direction: column; justify-content: center; flex-shrink: 1; min-height: 0; box-sizing: border-box; width: 100%; }
        .evento h2 { margin: 0; color: #d32f2f; line-height: 1; font-size: 2.5vh; }
        .evento p { margin: 2px 0 0; font-weight: bold; line-height: 1.1; font-size: 3vh; word-wrap: break-word; }
        .urgente.activo { border: 8px solid #ff0000; animation: blinker 1s linear infinite; background-color: #fff0f0; }
        @keyframes blinker { 50% { border-color: transparent; } }
        #status-dot { position: fixed; top: 5px; right: 5px; width: 10px; height: 10px; border-radius: 50%; background: #4CAF50; z-index: 1000; border: 1px solid #000; }
    </style>
</head>
<body>

<div id="status-dot"></div>

<div class="container">
    <div class="col col-hoy">
        <h1 id="txt-hoy">HOY</h1>
        <button class="btn-repaso" onclick="repasarDia('hoy')">🔊 TODO HOY</button>
        <div id="lista-hoy" class="lista-eventos"></div>
    </div>

    <div class="col col-manana">
        <h1 id="txt-manana">MAÑANA</h1>
        <button class="btn-repaso" onclick="repasarDia('manana')" style="border-color: #FFF;">🔊 TODO MAÑANA</button>
        <div id="lista-manana" class="lista-eventos"></div>
    </div>
</div>

<script>
    const API_KEY = 'AIzaSyAtAuM4-eUL5JxWJTTfvOfIeSoohUzY0uQ'; 
    const CALENDAR_ID = '28451d471eac1ddfffe0b11721d46c8850993884a38c3cd8e0df6506848d8ae3@group.calendar.google.com';

    let eventosHoy = [];
    let eventosManana = [];

    // Intenta mantener la pantalla encendida
    if ('wakeLock' in navigator) {
        navigator.wakeLock.request('screen').catch(err => console.log("WakeLock bloqueado"));
    }

    function limpiarTexto(t) { return t.replace(/\*/g, '').replace(/\[ALERTA\]/gi, '').trim(); }

    function horaNatural(fecha) {
        let h = fecha.getHours();
        let m = fecha.getMinutes();
        let period = h >= 12 ? 'de la tarde' : 'de la mañana';
        if (h > 12) h -= 12;
        if (h === 0) h = 12;
        return h + (m === 0 ? "" : " y " + m) + " " + period;
    }

    function horaVisualLimpia(fecha) {
        let h = fecha.getHours();
        let m = fecha.getMinutes();
        if (h > 12) h -= 12;
        if (h === 0) h = 12;
        return h + ':' + (m < 10 ? '0' + m : m);
    }

    async function cargarCalendario() {
        const min = new Date(); min.setHours(0,0,0,0);
        const url = `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(CALENDAR_ID)}/events?key=${API_KEY}&timeMin=${min.toISOString()}&singleEvents=true&orderBy=startTime&t=${new Date().getTime()}`;
        try {
            const r = await fetch(url, { cache: 'no-store' });
            const d = await r.json();
            document.getElementById('status-dot').style.backgroundColor = '#4CAF50';
            if(d.items) organizarEventos(d.items);
        } catch (e) { document.getElementById('status-dot').style.backgroundColor = '#F44336'; }
    }

    function organizarEventos(items) {
        const hoyStr = new Date().toLocaleDateString();
        const ahora = new Date();
        eventosHoy = []; eventosManana = [];
        items.forEach(item => {
            const inicio = new Date(item.start.dateTime || item.start.date);
            const ev = {
                titulo: limpiarTexto(item.summary || "Sin título"),
                horaV: horaVisualLimpia(inicio),
                horaVoz: horaNatural(inicio),
                obj: inicio,
                esAlerta: (item.summary || "").includes("*"),
                estaActivo: inicio.getTime() + 600000 > ahora.getTime()
            };
            if (inicio.toLocaleDateString() === hoyStr) eventosHoy.push(ev);
            else eventosManana.push(ev);
        });
        dibujarYEscalar();
    }

    function dibujarYEscalar() {
        const opc = { day: 'numeric', month: 'short' };
        const d = new Date();
        document.getElementById('txt-hoy').innerText = "HOY " + d.toLocaleDateString('es-ES', opc).toUpperCase();
        d.setDate(d.getDate() + 1);
        document.getElementById('txt-manana').innerText = "MAÑ. " + d.toLocaleDateString('es-ES', opc).toUpperCase();

        renderLista(eventosHoy, 'lista-hoy');
        renderLista(eventosManana, 'lista-manana');

        setTimeout(() => {
            ajustarTexto('lista-hoy');
            ajustarTexto('lista-manana');
        }, 50);
    }

    function renderLista(lista, id) {
        const cont = document.getElementById(id);
        cont.innerHTML = "";
        const esManana = (id === 'lista-manana');
        lista.forEach(ev => {
            const div = document.createElement('div');
            div.className = "evento " + (ev.esAlerta ? 'urgente ' : '') + (ev.esAlerta && ev.estaActivo ? 'activo' : '');
            div.onclick = function() { 
                const prefijo = esManana ? "Mañana tienes a las " : "Hoy a las ";
                hablar(prefijo + ev.horaVoz + ", " + ev.titulo); 
            };
            div.innerHTML = `<h2>${ev.horaV}</h2><p>${ev.titulo}</p>`;
            cont.appendChild(div);
        });
    }

    function ajustarTexto(idContenedor) {
        const cont = document.getElementById(idContenedor);
        const eventos = cont.getElementsByClassName('evento');
        if (eventos.length === 0) return;
        let fontSizeP = 3.5; 
        let maxHeight = cont.clientHeight;
        while (cont.scrollHeight > maxHeight && fontSizeP > 1.0) {
            fontSizeP -= 0.1;
            for (let ev of eventos) {
                ev.querySelector('h2').style.fontSize = (fontSizeP * 0.7) + "vh";
                ev.querySelector('p').style.fontSize = fontSizeP + "vh";
            }
        }
    }

    function hablar(t) {
        window.speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(t);
        m.lang = 'es-ES'; m.rate = 0.8;
        window.speechSynthesis.speak(m);
    }

    function sonarCampana(callback) {
        const context = new (window.AudioContext || window.webkitAudioContext)();
        const duration = 15; const startTime = context.currentTime;
        for (let i = 0; i < duration; i += 0.8) {
            [880, 1100].forEach((freq, idx) => {
                const osc = context.createOscillator();
                const gain = context.createGain();
                osc.type = 'square';
                osc.frequency.setValueAtTime(freq, startTime + i + (idx * 0.1));
                gain.gain.setValueAtTime(0, startTime + i + (idx * 0.1));
                gain.gain.linearRampToValueAtTime(0.3, startTime + i + (idx * 0.1) + 0.05);
                gain.gain.linearRampToValueAtTime(0, startTime + i + (idx * 0.1) + 0.4);
                osc.connect(gain);
                gain.connect(context.destination);
                osc.start(startTime + i + (idx * 0.1));
                osc.stop(startTime + i + (idx * 0.1) + 0.4);
            });
        }
        setTimeout(callback, duration * 1000);
    }

    function hablarTriple(mensajeCompleto) {
        let veces = 0;
        function repetir() {
            if (veces < 3) {
                const m = new SpeechSynthesisUtterance(mensajeCompleto);
                m.lang = 'es-ES'; m.rate = 0.8;
                m.onend = () => { veces++; setTimeout(repetir, 1500); };
                window.speechSynthesis.speak(m);
            }
        }
        repetir();
    }

    function repasarDia(dia) {
        const lista = (dia === 'hoy' ? eventosHoy : eventosManana);
        if (lista.length === 0) return hablar("No tienes nada anotado.");
        let t = (dia === 'hoy' ? "Hoy tienes: " : "Mañana tienes: ");
        lista.forEach(ev => { t += `A las ${ev.horaVoz}, ${ev.titulo}. `; });
        hablar(t);
    }

    setInterval(() => {
        const ahora = new Date();
        eventosHoy.forEach(ev => {
            if (ev.esAlerta && ev.obj.getHours() === ahora.getHours() && ev.obj.getMinutes() === ahora.getMinutes() && ahora.getSeconds() < 2) {
                sonarCampana(() => {
                    hablarTriple(`Atención mamá. Es hora de: ${ev.titulo}`);
                });
            }
        });
        if (ahora.getSeconds() < 2) dibujarYEscalar();
    }, 1000);

    setInterval(cargarCalendario, 300000);
    window.onload = cargarCalendario;
    window.onresize = dibujarYEscalar;
</script>
</body>
</html>
