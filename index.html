<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Calendario Mamá</title>
    
    <style>
        :root { --hoy-bg: #FFEB3B; --manana-bg: #1A237E; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Arial Black', Gadget, sans-serif; overflow: hidden; background: #000; }
        
        /* Botón inicial para forzar pantalla completa y audio */
        #btn-f-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 9999; font-size: 30px; font-weight: bold;
            background: #ff0000; color: white; border: none;
            cursor: pointer; text-transform: uppercase;
        }

        .container { display: flex; height: 100vh; width: 100vw; flex-direction: row; }
        
        .col { 
            width: 50%; padding: 8px; display: flex; 
            flex-direction: column; box-sizing: border-box; height: 100vh;
        }

        .col-hoy { background-color: var(--hoy-bg); color: #000; border-right: 4px solid #000; }
        .col-manana { background-color: var(--manana-bg); color: #FFF; }

        h1 { font-size: 2.5vh; margin: 5px 0; text-align: center; text-transform: uppercase; }
        
        .btn-repaso { 
            width: 100%; padding: 12px 2px; font-size: 2vh; font-weight: bold; 
            border-radius: 10px; border: 3px solid #000; margin-bottom: 10px;
            background: #fff; color: #000; flex-shrink: 0;
        }

        .lista-eventos { flex-grow: 1; display: flex; flex-direction: column; gap: 8px; overflow: hidden; }

        .evento { 
            background: white; color: #000; padding: 10px; border-radius: 15px; 
            border: 4px solid #333; display: flex; flex-direction: column;
            justify-content: center; flex-shrink: 1; min-height: 0; box-sizing: border-box;
        }

        .evento h2 { margin: 0; color: #d32f2f; line-height: 1; font-size: 3vh; }
        .evento p { margin: 4px 0 0; font-weight: bold; line-height: 1.1; font-size: 3.5vh; }
        
        /* ESTILO DE ALERTA: PARPADEA SIEMPRE SI TIENE LA CLASE */
        .urgente-siempre { 
            border: 10px solid #ff0000 !important; 
            background-color: #fff0f0 !important;
            animation: blinker 0.8s linear infinite !important;
        }

        @keyframes blinker {
            0% { border-color: #ff0000; }
            50% { border-color: transparent; }
            100% { border-color: #ff0000; }
        }

        #status-dot { position: fixed; top: 10px; right: 10px; width: 12px; height: 12px; border-radius: 50%; background: #4CAF50; z-index: 1000; border: 2px solid #000; }
    </style>
</head>
<body>

<div id="status-dot"></div>
<button id="btn-f-screen" onclick="entrarPantallaCompleta()">PULSA AQUÍ PARA EMPEZAR</button>

<div class="container">
    <div class="col col-hoy">
        <h1 id="txt-hoy">HOY</h1>
        <button class="btn-repaso" onclick="repasarDia('hoy')">🔊 ESCUCHAR HOY</button>
        <div id="lista-hoy" class="lista-eventos"></div>
    </div>
    <div class="col col-manana">
        <h1 id="txt-manana">MAÑANA</h1>
        <button class="btn-repaso" onclick="repasarDia('manana')" style="border-color: #FFF;">🔊 ESCUCHAR MAÑANA</button>
        <div id="lista-manana" class="lista-eventos"></div>
    </div>
</div>

<script>
    const API_KEY = 'AIzaSyAtAuM4-eUL5JxWJTTfvOfIeSoohUzY0uQ'; 
    const CALENDAR_ID = '28451d471eac1ddfffe0b11721d46c8850993884a38c3cd8e0df6506848d8ae3@group.calendar.google.com';

    let eventosHoy = [];
    let eventosManana = [];

    function entrarPantallaCompleta() {
        let elem = document.documentElement;
        if (elem.requestFullscreen) elem.requestFullscreen();
        else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
        document.getElementById('btn-f-screen').style.display = 'none';
        
        // Desbloqueamos el motor de voz al hacer clic
        const context = new (window.AudioContext || window.webkitAudioContext)();
        context.resume();
        window.speechSynthesis.getVoices();
    }

    function limpiarTexto(t) { return t.replace(/\*/g, '').trim(); }

    function horaVisualLimpia(fecha) {
        let h = fecha.getHours();
        let m = fecha.getMinutes();
        let ampm = h >= 12 ? 'pm' : 'am';
        h = h % 12 || 12;
        return h + ':' + (m < 10 ? '0' + m : m) + ' ' + ampm;
    }

    async function cargarCalendario() {
        const min = new Date(); min.setHours(0,0,0,0);
        const url = `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(CALENDAR_ID)}/events?key=${API_KEY}&timeMin=${min.toISOString()}&singleEvents=true&orderBy=startTime&t=${new Date().getTime()}`;
        try {
            const r = await fetch(url, { cache: 'no-store' });
            const d = await r.json();
            document.getElementById('status-dot').style.backgroundColor = '#4CAF50';
            if(d.items) organizarEventos(d.items);
        } catch (e) { document.getElementById('status-dot').style.backgroundColor = '#F44336'; }
    }

    function organizarEventos(items) {
        const hoyStr = new Date().toLocaleDateString();
        eventosHoy = []; eventosManana = [];
        
        items.forEach(item => {
            const inicio = new Date(item.start.dateTime || item.start.date);
            const tituloOriginal = item.summary || "Sin título";
            const esAlerta = tituloOriginal.includes("*");

            const ev = {
                titulo: limpiarTexto(tituloOriginal),
                horaV: horaVisualLimpia(inicio),
                obj: inicio,
                esAlerta: esAlerta
            };
            if (inicio.toLocaleDateString() === hoyStr) eventosHoy.push(ev);
            else eventosManana.push(ev);
        });
        dibujarYEscalar();
    }

    function dibujarYEscalar() {
        const d = new Date();
        document.getElementById('txt-hoy').innerText = "HOY";
        document.getElementById('txt-manana').innerText = "MAÑANA";
        
        renderLista(eventosHoy, 'lista-hoy');
        renderLista(eventosManana, 'lista-manana');
        setTimeout(() => { ajustarTexto('lista-hoy'); ajustarTexto('lista-manana'); }, 50);
    }

    function renderLista(lista, id) {
        const cont = document.getElementById(id);
        cont.innerHTML = "";
        lista.forEach(ev => {
            const div = document.createElement('div');
            // LÓGICA RECUPERADA: Si tiene el asterisco, parpadea SIEMPRE
            div.className = "evento " + (ev.esAlerta ? "urgente-siempre" : "");
            div.innerHTML = `<h2>${ev.horaV}</h2><p>${ev.titulo}</p>`;
            cont.appendChild(div);
        });
    }

    function ajustarTexto(idContenedor) {
        const cont = document.getElementById(idContenedor);
        const eventos = cont.getElementsByClassName('evento');
        if (eventos.length === 0) return;
        let fontSizeP = 4; 
        while (cont.scrollHeight > cont.clientHeight && fontSizeP > 1.2) {
            fontSizeP -= 0.1;
            for (let ev of eventos) {
                ev.querySelector('h2').style.fontSize = (fontSizeP * 0.7) + "vh";
                ev.querySelector('p').style.fontSize = fontSizeP + "vh";
            }
        }
    }

    function hablar(t) {
        window.speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(t);
        m.lang = 'es-ES'; m.rate = 0.8;
        window.speechSynthesis.speak(m);
    }

    function repasarDia(dia) {
        const lista = (dia === 'hoy' ? eventosHoy : eventosManana);
        if (lista.length === 0) return hablar("No hay eventos.");
        let t = (dia === 'hoy' ? "Para hoy tienes: " : "Para mañana tienes: ");
        lista.forEach(ev => { t += `${ev.horaV}, ${ev.titulo}. `; });
        hablar(t);
    }

    setInterval(cargarCalendario, 60000);
    window.onload = cargarCalendario;
</script>
</body>
</html>
