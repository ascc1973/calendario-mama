<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendario para Mamá</title>

<style>

:root{
--hoy-bg:#FFEB3B;
--manana-bg:#1A237E;
}

body,html{
margin:0;
padding:0;
height:100%;
font-family:'Arial Black',sans-serif;
overflow:hidden;
background:#000;
}

#reloj{
position:fixed;
top:0;
left:0;
width:100%;
background:rgba(0,0,0,0.9);
color:white;
text-align:center;
padding:10px 0;
z-index:1000;
}

#fecha{font-size:2.3vh;}
#hora{font-size:4.2vh;}

.container{
display:none;
flex-direction:row;
height:100vh;
width:100vw;
padding-top:90px;
}

#btn-inicial{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
background:#ff0000;
color:white;
font-size:5vh;
font-weight:bold;
border:none;
z-index:9999;
cursor:pointer;
}

.col{
width:50%;
padding:5px;
display:flex;
flex-direction:column;
}

.col-hoy{
background:var(--hoy-bg);
border-right:3px solid #000;
}

.col-manana{
background:var(--manana-bg);
color:white;
}

h1{
font-size:2.2vh;
margin:2px 0;
text-align:center;
}

.btn-repaso{
width:100%;
padding:8px;
font-size:1.6vh;
font-weight:bold;
border-radius:8px;
border:2px solid #000;
margin-bottom:5px;
background:#fff;
cursor:pointer;
}

.lista-eventos{
flex-grow:1;
display:flex;
flex-direction:column;
gap:4px;
}

.evento{
background:white;
color:#000;
padding:7px;
border-radius:10px;
border:3px solid #333;
display:flex;
flex-direction:column;
cursor:pointer;
}

.evento h2{
margin:0;
color:#d32f2f;
font-size:2.5vh;
}

.evento p{
margin:2px 0 0;
font-weight:bold;
font-size:2.8vh;
}

.urgente-perma{
border:7px solid #ff0000 !important;
animation:parpadeo-alerta 0.8s linear infinite !important;
}

@keyframes parpadeo-alerta{
0%{background:#00ff00;border-color:#ff0000;}
50%{background:#ffffff;border-color:#ffffff;}
100%{background:#00ff00;border-color:#ff0000;}
}

</style>
</head>

<body>

<div id="reloj">
<div id="fecha"></div>
<div id="hora"></div>
</div>

<button id="btn-inicial">PULSA PARA ACTIVAR CALENDARIO Y SONIDO</button>

<div class="container">

<div class="col col-hoy">
<h1>HOY</h1>
<button class="btn-repaso" onclick="repasarDia('hoy')">🔊 TODO HOY</button>
<div id="lista-hoy" class="lista-eventos"></div>
</div>

<div class="col col-manana">
<h1>MAÑANA</h1>
<button class="btn-repaso" onclick="repasarDia('manana')">🔊 TODO MAÑANA</button>
<div id="lista-manana" class="lista-eventos"></div>
</div>

</div>

<script>

const API_KEY='AIzaSyAtAuM4-eUL5JxWJTTfvOfIeSoohUzY0uQ';
const CALENDAR_ID='28451d471eac1ddfffe0b11721d46c8850993884a38c3cd8e0df6506848d8ae3@group.calendar.google.com';

let eventosHoy=[];
let eventosManana=[];
let alarmasActivas={};
let eventosAtendidos=new Set();
let idsAvisados=new Set();
let avisosPrevios=new Set();

document.getElementById("btn-inicial").onclick=iniciarSistema;

function iniciarSistema(){

if(document.documentElement.requestFullscreen)
document.documentElement.requestFullscreen();

document.getElementById('btn-inicial').style.display='none';
document.querySelector('.container').style.display='flex';

hablar("Sistema activado");

cargarCalendario();

setInterval(verificarAlertas,5000);
setInterval(cargarCalendario,60000);
setInterval(actualizarReloj,1000);

}

function actualizarReloj(){

const ahora=new Date();

const fecha=ahora.toLocaleDateString('es-ES',{
weekday:'long',
day:'numeric',
month:'long'
}).toUpperCase();

let h=ahora.getHours();
let m=ahora.getMinutes();

if(h>12)h-=12;
if(h===0)h=12;
if(m<10)m="0"+m;

document.getElementById("fecha").innerText=fecha;
document.getElementById("hora").innerText=h+":"+m;

}

function contarAsteriscos(t){
const m=t.match(/^\*+/);
return m?m[0].length:0;
}

function limpiarTexto(t){
return t.replace(/\*/g,'').trim();
}

function horaActualVoz(){
let ahora=new Date();
let h=ahora.getHours();
let m=ahora.getMinutes();
if(h>12)h-=12;
if(h===0)h=12;
return h+" y "+m;
}

function hablar(t){
const u=new SpeechSynthesisUtterance(t);
u.lang='es-ES';
u.rate=0.9;
speechSynthesis.speak(u);
}

function hablarTresVeces(texto){

let n=0;

function repetir(){

if(n>=3) return;

const u=new SpeechSynthesisUtterance(texto);
u.lang='es-ES';

u.onend=()=>{
n++;
repetir();
};

speechSynthesis.speak(u);

}

repetir();

}

function iniciarAlarma(ev){

const mensaje=()=>`Atención mamá. Son las ${horaActualVoz()}. ${ev.titulo}`;

if(!eventosAtendidos.has(ev.id))
hablarTresVeces(mensaje());

alarmasActivas[ev.id]=setInterval(()=>{

if(!eventosAtendidos.has(ev.id))
hablarTresVeces(mensaje());

},120000);

}

function verificarAlertas(){

const ahora=new Date();

[eventosHoy,eventosManana].forEach(lista=>{

lista.forEach(ev=>{

const inicio=ev.obj.getTime();
const diff=inicio-ahora.getTime();

const minutos=Math.floor(diff/60000);

if(ev.asteriscos===2 && (minutos===120 || minutos===60))
activarSecuencia(ev);

if(ev.asteriscos===3 && (minutos===180 || minutos===120 || minutos===60))
activarSecuencia(ev);

if(Math.abs(diff)<60000 && !idsAvisados.has(ev.id)){

idsAvisados.add(ev.id);
iniciarAlarma(ev);

}

});

});

}

function activarSecuencia(ev){

if(avisosPrevios.has(ev.id)) return;

avisosPrevios.add(ev.id);

const mensaje=`Recordatorio. ${ev.titulo}`;

hablarTresVeces(mensaje);

setTimeout(()=>hablarTresVeces(mensaje),60000);
setTimeout(()=>hablarTresVeces(mensaje),120000);

}

</script>
</body>
</html>
