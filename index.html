<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Calendario para Mamá</title>
<style>
:root { --hoy-bg: #FFEB3B; --manana-bg: #1A237E; }
html, body { margin:0; padding:0; height:100%; font-family:'Arial Black', sans-serif; background:#000; overflow:hidden; }
#btn-inicial { position: fixed; top:0; left:0; width:100vw; height:100vh; z-index:9999;
  background:#ff0000; color:#fff; font-size:5vh; font-weight:bold; border:none; cursor:pointer; text-transform:uppercase; }
#reloj { position: fixed; top:0; left:0; width:100%; text-align:center; font-size:3.5vh; color:#FFF; z-index:1000; }
.container { display:flex; height:100vh; width:100vw; padding-top:5vh; box-sizing:border-box; }
.col { width:50%; padding:5px; display:flex; flex-direction:column; box-sizing:border-box; }
.col-hoy { background-color:var(--hoy-bg); color:#000; border-right:3px solid #000; }
.col-manana { background-color:var(--manana-bg); color:#FFF; }
h1 { font-size:2.2vh; margin:2px 0; text-align:center; text-transform:uppercase; white-space:nowrap; overflow:hidden; }
.btn-repaso { width:100%; padding:8px 2px; font-size:1.6vh; font-weight:bold; border-radius:8px; border:2px solid #000; margin-bottom:5px; background:#fff; cursor:pointer; color:#000; flex-shrink:0; text-transform:uppercase; }
.lista-eventos { flex-grow:1; display:flex; flex-direction:column; gap:4px; overflow:hidden; }
.evento { background:white; color:#000; padding:7px; border-radius:10px; border:2.5px solid #333; display:flex; flex-direction:column; justify-content:center; flex-shrink:1; min-height:0; box-sizing:border-box; width:100%; background-clip:padding-box; cursor:pointer; }
.evento h2 { margin:0; color:#d32f2f; line-height:1; font-size:2.5vh; pointer-events:none; }
.evento p { margin:2px 0 0; font-weight:bold; line-height:1.1; font-size:2.8vh; pointer-events:none; }
.urgente-perma { border:2.5px solid #ff0000 !important; animation:blinker-completo 1s linear infinite !important; background-color:#fff0f0; }
@keyframes blinker-completo { 0%{border-color:#ff0000;}50%{border-color:transparent;}100%{border-color:#ff0000;} }
#status-dot { position:fixed; top:3px; right:3px; width:8px; height:8px; border-radius:50%; background:#4CAF50; z-index:1000; border:1px solid #000; }
</style>
</head>
<body>

<div id="status-dot"></div>
<div id="reloj"></div>
<button id="btn-inicial" onclick="iniciarApp()">PULSA PARA ACTIVAR CALENDARIO Y SONIDO</button>

<div class="container">
  <div class="col col-hoy">
    <h1 id="txt-hoy">HOY</h1>
    <button class="btn-repaso" onclick="repasarDia('hoy')">🔊 TODO HOY</button>
    <div id="lista-hoy" class="lista-eventos"></div>
  </div>
  <div class="col col-manana">
    <h1 id="txt-manana">MAÑANA</h1>
    <button class="btn-repaso" onclick="repasarDia('manana')" style="border-color:#FFF;">🔊 TODO MAÑANA</button>
    <div id="lista-manana" class="lista-eventos"></div>
  </div>
</div>

<script>
const API_KEY='AIzaSyAtAuM4-eUL5JxWJTTfvOfIeSoohUzY0uQ';
const CALENDAR_ID='28451d471eac1ddfffe0b11721d46c8850993884a38c3cd8e0df6506848d8ae3@group.calendar.google.com';
let eventosHoy=[], eventosManana=[], audioContext, idsAvisados=new Set(), sistemaActivado=false;

function iniciarApp(){
  document.getElementById('btn-inicial').style.display='none';
  document.documentElement.requestFullscreen?.();
  audioContext = new (window.AudioContext||window.webkitAudioContext)();
  audioContext.resume();
  window.speechSynthesis.getVoices();
  if(!sistemaActivado){ hablar("Sistema activado"); sistemaActivado=true; }
  
  setInterval(latidoSilencioso,30000);
  cargarCalendario();
  setInterval(cargarCalendario,60000);
  setInterval(verificarAlertas,1000);
  setInterval(actualizarReloj,1000);
}

function latidoSilencioso(){
  const osc = audioContext.createOscillator();
  const gain = audioContext.createGain();
  gain.gain.value=0.001;
  osc.connect(gain); gain.connect(audioContext.destination);
  osc.start(); osc.stop(audioContext.currentTime+0.1);
}

function actualizarReloj(){
  const d=new Date();
  const h=(d.getHours()<10?'0':'')+d.getHours();
  const m=(d.getMinutes()<10?'0':'')+d.getMinutes();
  document.getElementById('reloj').innerText=h+":"+m;
}

function limpiarTexto(t){ return t.replace(/\*/g,'').trim(); }

function horaNatural(fecha){
  let h=fecha.getHours(), m=fecha.getMinutes(), period=h>=12?'de la tarde':'de la mañana';
  if(h>12) h-=12; if(h===0) h=12;
  return h+(m===0?'':' y '+m)+' '+period;
}

async function cargarCalendario(){
  const min=new Date(); min.setHours(0,0,0,0);
  const url=`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(CALENDAR_ID)}/events?key=${API_KEY}&timeMin=${min.toISOString()}&singleEvents=true&orderBy=startTime&t=${Date.now()}`;
  try{
    const r=await fetch(url,{cache:'no-store'}); const d=await r.json();
    document.getElementById('status-dot').style.backgroundColor='#4CAF50';
    if(d.items) organizarEventos(d.items);
  }catch(e){ document.getElementById('status-dot').style.backgroundColor='#F44336'; }
}

function organizarEventos(items){
  const hoyStr=new Date().toLocaleDateString();
  eventosHoy=[]; eventosManana=[];
  items.forEach(item=>{
    const sum=item.summary||"";
    const inicio=new Date(item.start.dateTime||item.start.date);
    const fin=new Date(item.end.dateTime||item.end);
    let ant=0;
    if(sum.startsWith('***')) ant=3;
    else if(sum.startsWith('**')) ant=2;
    else if(sum.startsWith('*')) ant=0;
    else ant=-1;
    const ev={
      id:item.id+inicio.getTime(),
      titulo:limpiarTexto(sum),
      horaV:inicio.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit',hour12:true}),
      horaVoz:horaNatural(inicio),
      obj:inicio,
      objFin:fin,
      antelacion:ant,
      esAlerta:ant>=0,
      avisado: false
    };
    if(inicio.toLocaleDateString()===hoyStr) eventosHoy.push(ev);
    else eventosManana.push(ev);
  });
  dibujarYEscalar();
}

function dibujarYEscalar(){
  const opc={weekday:'long'};
  const dHoy=new Date();
  document.getElementById('txt-hoy').innerText="HOY "+dHoy.toLocaleDateString('es-ES',opc).toUpperCase();
  const dMan=new Date(); dMan.setDate(dMan.getDate()+1);
  document.getElementById('txt-manana').innerText="MAÑANA "+dMan.toLocaleDateString('es-ES',opc).toUpperCase();
  renderLista(eventosHoy,'lista-hoy','hoy');
  renderLista(eventosManana,'lista-manana','manana');
  setTimeout(()=>{ajustarTexto('lista-hoy'); ajustarTexto('lista-manana');},50);
}

function renderLista(lista,id,dia){
  const cont=document.getElementById(id); cont.innerHTML='';
  const ahora=new Date();
  lista.forEach(ev=>{
    const div=document.createElement('div');
    let haTerminado=ahora.getTime()>(ev.objFin.getTime()+60000);
    let mostrarUrgente=false;
    if(ev.esAlerta && !haTerminado){
      const inicioAviso=new Date(ev.obj.getTime()-(ev.antelacion*3600000));
      if(ahora>=inicioAviso) mostrarUrgente=true;
    }
    div.className="evento "+(mostrarUrgente?'urgente-perma':'');
    div.onclick=()=>{ hablarTriple(dia==='hoy'?"Hoy a las "+ev.horaVoz+", ":"Mañana a las "+ev.horaVoz+", "+ev.titulo); ev.avisado=true; idsAvisados.add(ev.id); };
    div.innerHTML=`<h2>${ev.horaV}</h2><p>${ev.titulo}</p>`;
    cont.appendChild(div);
  });
}

function ajustarTexto(id){
  const cont=document.getElementById(id);
  const eventos=cont.getElementsByClassName('evento');
  if(eventos.length===0) return;
  let fontSizeP=3.5;
  while(cont.scrollHeight>cont.clientHeight && fontSizeP>1.0){
    fontSizeP-=0.1;
    for(let ev of eventos){
      ev.querySelector('h2').style.fontSize=(fontSizeP*0.7)+"vh";
      ev.querySelector('p').style.fontSize=fontSizeP+"vh";
    }
  }
}

function hablar(t){
  window.speechSynthesis.cancel();
  const m=new SpeechSynthesisUtterance(t); m.lang='es-ES'; m.rate=0.8; window.speechSynthesis.speak(m);
}

function sonarCampana(callback){
  if(!audioContext) return callback();
  const duration=15; const startTime=audioContext.currentTime;
  for(let i=0;i<duration;i+=0.8){
    [880,1100].forEach((freq,idx)=>{
      const osc=audioContext.createOscillator();
      const gain=audioContext.createGain();
      osc.type='square'; osc.frequency.setValueAtTime(freq,startTime+i+(idx*0.1));
      gain.gain.setValueAtTime(0,startTime+i+(idx*0.1));
      gain.gain.linearRampToValueAtTime(0.3,startTime+i+(idx*0.1)+0.05);
      gain.gain.linearRampToValueAtTime(0,startTime+i+(idx*0.1)+0.4);
      osc.connect(gain); gain.connect(audioContext.destination);
      osc.start(startTime+i+(idx*0.1)); osc.stop(startTime+i+(idx*0.1)+0.4);
    });
  }
  setTimeout(callback,duration*1000);
}

function hablarTriple(mensaje){
  let veces=0;
  function repetir(){
    if(veces<3){ const m=new SpeechSynthesisUtterance(mensaje); m.lang='es-ES'; m.rate=0.8;
      m.onend=()=>{veces++; setTimeout(repetir,1500);}
      window.speechSynthesis.speak(m);
    }
  }
  repetir();
}

function repasarDia(dia){
  const lista=dia==='hoy'?eventosHoy:eventosManana;
  if(lista.length===0) return hablar("Nada anotado.");
  let t=dia==='hoy'?"Hoy tienes: ":"Mañana tienes: ";
  lista.forEach(ev=>{t+=`${ev.horaVoz}, ${ev.titulo}. `;});
  hablar(t);
}

function verificarAlertas(){
  const ahora=new Date();
  const hora=ahora.getHours(); const min=ahora.getMinutes();
  eventosHoy.concat(eventosManana).forEach(ev=>{
    if(!ev.esAlerta) return;
    const avisoReal=new Date(ev.obj.getTime()-(ev.antelacion*3600000));
    if(hora===avisoReal.getHours() && min===avisoReal.getMinutes() && !idsAvisados.has(ev.id)){
      sonarCampana(()=>{ hablarTriple((ev.antelacion>0?"Aviso importante mamá. En "+ev.antelacion+" horas ":"Atención mamá. Es hora de: ")+ev.titulo); });
      idsAvisados.add(ev.id);
    }
    // Repetir cada minuto hasta tocar
    if(ev.avisado===false && ahora>=avisoReal && ahora<=ev.objFin){
      if(!idsAvisados.has(ev.id+"_repetir")){
        sonarCampana(()=>{ hablarTriple("Recuerda: "+ev.titulo); });
        idsAvisados.add(ev.id+"_repetir");
        setTimeout(()=>idsAvisados.delete(ev.id+"_repetir"),60000);
      }
    }
  });
}
</script>
</body>
</html>
