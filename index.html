<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario Mama</title>
    <style>
        :root { --hoy-bg: #FFEB3B; --manana-bg: #1A237E; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: Arial, sans-serif; overflow: hidden; background: #000; }
        
        .container { display: flex; height: 100vh; width: 100vw; }
        
        .col { 
            width: 50%; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            box-sizing: border-box;
        }

        .col-hoy { background-color: var(--hoy-bg); color: #000; border-right: 5px solid #000; }
        .col-manana { background-color: var(--manana-bg); color: #FFF; }

        h1 { font-size: 2.5rem; margin: 0 0 15px 0; text-align: center; text-transform: uppercase; font-weight: bold; }
        
        .btn-repaso { 
            width: 100%; 
            padding: 20px; 
            font-size: 1.5rem; 
            font-weight: bold; 
            border-radius: 15px; 
            border: 3px solid #000; 
            cursor: pointer; 
            margin-bottom: 20px;
            background: #fff;
            color: #000;
        }

        .lista-eventos { 
            flex-grow: 1; 
            overflow-y: auto; 
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .evento { 
            background: white; 
            color: #000; 
            padding: 20px; 
            border-radius: 20px; 
            border: 4px solid #333; 
            cursor: pointer;
            flex-shrink: 0;
        }

        .evento h2 { margin: 0; font-size: 2rem; color: #d32f2f; }
        .evento p { margin: 5px 0 0; font-size: 1.8rem; font-weight: bold; }
        
        .urgente { border: 8px solid #ff0000; animation: blinker 1.5s linear infinite; }
        @keyframes blinker { 50% { border-color: transparent; } }
    </style>
</head>
<body>

<div class="container">
    <div class="col col-hoy">
        <h1 id="txt-hoy">HOY</h1>
        <button class="btn-repaso" onclick="repasarDia('hoy')">🔊 ESCUCHAR TODO HOY</button>
        <div id="lista-hoy" class="lista-eventos"></div>
    </div>

    <div class="col col-manana">
        <h1 id="txt-manana">MAÑANA</h1>
        <button class="btn-repaso" onclick="repasarDia('manana')" style="border-color: #FFF;">🔊 ESCUCHAR TODO MAÑANA</button>
        <div id="lista-manana" class="lista-eventos"></div>
    </div>
</div>

<script>
    // --- CONFIGURACIÓN ---
    const API_KEY = 'TU_CLAVE_API_AQUÍ'; 
    const CALENDAR_ID = 'TU_ID_CALENDARIO_MAMA';
    // ---------------------

    let eventosHoy = [];
    let eventosManana = [];

    function limpiarTexto(t) {
        return t.replace(/\*/g, '').replace(/\[ALERTA\]/gi, '').trim();
    }

    function horaNatural(fecha) {
        let h = fecha.getHours();
        let m = fecha.getMinutes();
        let period = h >= 12 ? 'de la tarde' : 'de la mañana';
        if (h > 12) h -= 12;
        if (h === 0) h = 12;
        let mins = m === 0 ? "" : " y " + m;
        return h + mins + " " + period;
    }

    function horaVisual(fecha) {
        let h = fecha.getHours();
        let m = fecha.getMinutes();
        let period = h >= 12 ? 'PM' : 'AM';
        if (h > 12) h -= 12;
        if (h === 0) h = 12;
        let mm = m < 10 ? '0' + m : m;
        return h + ':' + mm + ' ' + period;
    }

    async function cargarCalendario() {
        const hoyIso = new Date();
        hoyIso.setHours(0,0,0,0);
        const pasadoMananaIso = new Date();
        pasadoMananaIso.setDate(hoyIso.getDate() + 2);

        const url = `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(CALENDAR_ID)}/events?key=${API_KEY}&timeMin=${hoyIso.toISOString()}&timeMax=${pasadoMananaIso.toISOString()}&singleEvents=true&orderBy=startTime`;

        try {
            const response = await fetch(url);
            const data = await response.json();
            if(data.items) {
                organizarEventos(data.items);
            }
        } catch (e) { console.error("Error:", e); }
    }

    function organizarEventos(items) {
        const hoyStr = new Date().toLocaleDateString();
        eventosHoy = [];
        eventosManana = [];

        items.forEach(item => {
            const inicio = new Date(item.start.dateTime || item.start.date);
            const ev = {
                titulo: limpiarTexto(item.summary || "Sin título"),
                horaV: horaVisual(inicio),
                horaVoz: horaNatural(inicio),
                obj: inicio,
                esAlerta: (item.summary || "").includes("*")
            };

            if (inicio.toLocaleDateString() === hoyStr) {
                eventosHoy.push(ev);
            } else {
                eventosManana.push(ev);
            }
        });
        dibujarPantalla();
    }

    function hablar(t) {
        window.speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(t);
        m.lang = 'es-ES';
        m.rate = 0.8;
        window.speechSynthesis.speak(m);
    }

    function dibujarPantalla() {
        const opc = { weekday: 'long', day: 'numeric', month: 'long' };
        const d = new Date();
        document.getElementById('txt-hoy').innerText = "HOY: " + d.toLocaleDateString('es-ES', opc);
        
        const d2 = new Date();
        d2.setDate(d2.getDate() + 1);
        document.getElementById('txt-manana').innerText = "MAÑANA: " + d2.toLocaleDateString('es-ES', opc);

        renderLista(eventosHoy, 'lista-hoy');
        renderLista(eventosManana, 'lista-manana');
    }

    function renderLista(lista, id) {
        const cont = document.getElementById(id);
        cont.innerHTML = "";
        lista.forEach(ev => {
            const div = document.createElement('div');
            div.className = "evento " + (ev.esAlerta ? 'urgente' : '');
            div.onclick = function() { hablar("A las " + ev.horaVoz + ", " + ev.titulo); };
            div.innerHTML = "<h2>" + ev.horaV + "</h2><p>" + ev.titulo + "</p>";
            cont.appendChild(div);
        });
    }

    function repasarDia(dia) {
        const lista = dia === 'hoy' ? eventosHoy : eventosManana;
        if (lista.length === 0) return hablar("No tienes nada anotado.");
        let t = (dia === 'hoy' ? "Hoy tienes: " : "Mañana tienes: ");
        lista.forEach(ev => { t += "A las " + ev.horaVoz + ", " + ev.titulo + ". "; });
        hablar(t);
    }

    setInterval(function() {
        const ahora = new Date();
        eventosHoy.forEach(ev => {
            if (ev.esAlerta && ev.obj.getHours() === ahora.getHours() && ev.obj.getMinutes() === ahora.getMinutes() && ahora.getSeconds() < 2) {
                hablar("Atención. Es hora de: " + ev.titulo);
            }
        });
    }, 1000);

    setInterval(cargarCalendario, 300000);
    window.onload = cargarCalendario;
</script>
</body>
</html>
