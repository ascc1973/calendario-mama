<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Calendario para Mamá</title>

<style>

:root { --hoy-bg:#FFEB3B; --manana-bg:#1A237E; }

body,html{
margin:0;
padding:0;
height:100%;
font-family:'Arial Black',sans-serif;
overflow:hidden;
background:#000;
}

#btn-inicial{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
background:#ff0000;
color:white;
font-size:5vh;
font-weight:bold;
border:none;
z-index:9999;
cursor:pointer;
text-transform:uppercase;
}

.container{
display:flex;
height:100vh;
width:100vw;
flex-direction:row;
display:none;
}

.col{
width:50%;
padding:5px;
display:flex;
flex-direction:column;
box-sizing:border-box;
height:100vh;
}

.col-hoy{
background-color:var(--hoy-bg);
color:#000;
border-right:3px solid #000;
}

.col-manana{
background-color:var(--manana-bg);
color:#FFF;
}

h1{
font-size:2.2vh;
margin:2px 0;
text-align:center;
text-transform:uppercase;
}

.btn-repaso{
width:100%;
padding:8px 2px;
font-size:1.6vh;
font-weight:bold;
border-radius:8px;
border:2px solid #000;
margin-bottom:5px;
background:#fff;
cursor:pointer;
color:#000;
text-transform:uppercase;
}

.lista-eventos{
flex-grow:1;
display:flex;
flex-direction:column;
gap:4px;
overflow:hidden;
}

.evento{
background:white;
color:#000;
padding:7px;
border-radius:10px;
border:2.5px solid #333;
display:flex;
flex-direction:column;
justify-content:center;
flex-shrink:1;
min-height:0;
cursor:pointer;
}

.evento h2{
margin:0;
color:#d32f2f;
line-height:1;
font-size:2.5vh;
pointer-events:none;
}

.evento p{
margin:2px 0 0;
font-weight:bold;
line-height:1.1;
font-size:2.8vh;
pointer-events:none;
}

.urgente-perma{
border:2.5px solid #ff0000 !important;
animation:parpadeo-alerta 1s linear infinite !important;
}

@keyframes parpadeo-alerta{

0%{
border-color:#ff0000;
background:#fff0f0;
}

50%{
border-color:transparent;
background:#ffffff;
}

100%{
border-color:#ff0000;
background:#fff0f0;
}

}

#status-dot{
position:fixed;
top:3px;
right:3px;
width:8px;
height:8px;
border-radius:50%;
background:#4CAF50;
z-index:1000;
border:1px solid #000;
}

</style>
</head>

<body>

<button id="btn-inicial" onclick="iniciarSistema()">PULSA PARA ACTIVAR CALENDARIO Y SONIDO</button>

<div id="status-dot"></div>

<div class="container">

<div class="col col-hoy">
<h1 id="txt-hoy">HOY</h1>
<button class="btn-repaso" onclick="repasarDia('hoy')">🔊 TODO HOY</button>
<div id="lista-hoy" class="lista-eventos"></div>
</div>

<div class="col col-manana">
<h1 id="txt-manana">MAÑANA</h1>
<button class="btn-repaso" onclick="repasarDia('manana')" style="border-color:#FFF;">🔊 TODO MAÑANA</button>
<div id="lista-manana" class="lista-eventos"></div>
</div>

</div>

<script>

const API_KEY='AIzaSyAtAuM4-eUL5JxWJTTfvOfIeSoohUzY0uQ';
const CALENDAR_ID='28451d471eac1ddfffe0b11721d46c8850993884a38c3cd8e0df6506848d8ae3@group.calendar.google.com';

let eventosHoy=[];
let eventosManana=[];
let idsAvisados=new Set();
let audioContext;
let alarmasActivas={};

function iniciarSistema(){

document.getElementById('btn-inicial').style.display='none';
document.querySelector('.container').style.display='flex';

if(document.documentElement.requestFullscreen){
document.documentElement.requestFullscreen();
}

audioContext=new (window.AudioContext||window.webkitAudioContext)();
audioContext.resume();

const voicesReady=()=>new Promise(resolve=>{
let voices=speechSynthesis.getVoices();
if(voices.length>0) resolve();
else speechSynthesis.onvoiceschanged=()=>resolve();
});

voicesReady().then(()=>{

hablar("Sistema activado");

cargarCalendario();

setInterval(()=>{
const osc=audioContext.createOscillator();
const gain=audioContext.createGain();
gain.gain.value=0.001;
osc.connect(gain);
gain.connect(audioContext.destination);
osc.start();
osc.stop(audioContext.currentTime+0.1);
},30000);

setInterval(verificarAlertas,5000);
setInterval(cargarCalendario,60000);

});

}

function limpiarTexto(t){return t.replace(/\*/g,'').trim();}

function horaVisualLimpia(f){
let h=f.getHours();
let m=f.getMinutes();
if(h>12)h-=12;
if(h===0)h=12;
return h+":"+(m<10?'0'+m:m);
}

function horaNatural(f){
let h=f.getHours(),m=f.getMinutes(),p=h>=12?'de la tarde':'de la mañana';
if(h>12)h-=12;
if(h===0)h=12;
return h+(m===0?'':' y '+m)+' '+p;
}

async function cargarCalendario(){

const min=new Date();
min.setHours(0,0,0,0);

const url=`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(CALENDAR_ID)}/events?key=${API_KEY}&timeMin=${min.toISOString()}&singleEvents=true&orderBy=startTime&t=${Date.now()}`;

try{

const r=await fetch(url);
const d=await r.json();

if(d.items) organizarEventos(d.items);

document.getElementById('status-dot').style.backgroundColor='#4CAF50';

}catch(e){

document.getElementById('status-dot').style.backgroundColor='#F44336';

}

}

function organizarEventos(items){

const hoyStr=new Date().toLocaleDateString();

eventosHoy=[];
eventosManana=[];

items.forEach(item=>{

const inicio=new Date(item.start.dateTime||item.start.date);

const ev={
id:item.id+inicio.getTime(),
titulo:limpiarTexto(item.summary||"Sin título"),
horaV:horaVisualLimpia(inicio),
horaVoz:horaNatural(inicio),
obj:inicio,
esAlerta:(item.summary||"").includes("*")
};

if(inicio.toLocaleDateString()===hoyStr) eventosHoy.push(ev);
else eventosManana.push(ev);

});

dibujarYEscalar();

}

function dibujarYEscalar(){

const dHoy=new Date();
document.getElementById('txt-hoy').innerText="HOY "+dHoy.toLocaleDateString('es-ES',{weekday:'long'}).toUpperCase();

const dMan=new Date();
dMan.setDate(dMan.getDate()+1);

document.getElementById('txt-manana').innerText="MAÑANA "+dMan.toLocaleDateString('es-ES',{weekday:'long'}).toUpperCase();

renderLista(eventosHoy,'lista-hoy');
renderLista(eventosManana,'lista-manana');

setTimeout(()=>{
ajustarTexto('lista-hoy');
ajustarTexto('lista-manana');
},100);

}

function renderLista(lista,id){

const cont=document.getElementById(id);
cont.innerHTML="";

const ahora=new Date();

lista.forEach(ev=>{

const haTerminado=ahora.getTime()>(ev.obj.getTime()+3600000);

if(haTerminado) return;

const div=document.createElement('div');

let mostrarUrgente=false;

if(ev.esAlerta && ahora>=ev.obj && !haTerminado) mostrarUrgente=true;

div.className="evento "+(mostrarUrgente?'urgente-perma':'');

div.onclick=()=>{
cancelarAlarma(ev.id);
hablar((id==='lista-hoy'?"Hoy a las ":"Mañana a las ")+ev.horaVoz+", "+ev.titulo);
};

div.innerHTML=`<h2>${ev.horaV}</h2><p>${ev.titulo}</p>`;

cont.appendChild(div);

});

}

function ajustarTexto(id){

const cont=document.getElementById(id);
const eventos=cont.getElementsByClassName('evento');

if(eventos.length===0) return;

let fontSizeP=3.5;

while(cont.scrollHeight>cont.clientHeight && fontSizeP>1.0){

fontSizeP-=0.1;

for(let ev of eventos){

ev.querySelector('h2').style.fontSize=(fontSizeP*0.7)+"vh";
ev.querySelector('p').style.fontSize=fontSizeP+"vh";

}

}

}

function hablar(t){

window.speechSynthesis.cancel();

const m=new SpeechSynthesisUtterance(t);
m.lang='es-ES';
m.rate=0.9;
m.volume=1.0;

window.speechSynthesis.speak(m);

}

function hablarTresVeces(texto){

let repeticiones=0;

function repetir(){

if(repeticiones>=3) return;

const u=new SpeechSynthesisUtterance(texto);
u.lang='es-ES';
u.rate=0.9;

u.onend=()=>{
repeticiones++;
repetir();
};

speechSynthesis.speak(u);

}

repetir();

}

function iniciarAlarma(ev){

hablarTresVeces(`Atención mamá, son las ${ev.horaV}. Tienes: ${ev.titulo}`);

alarmasActivas[ev.id]=setInterval(()=>{

const ahora=new Date();

if(ahora.getTime()>ev.obj.getTime()+3600000){
cancelarAlarma(ev.id);
return;
}

hablarTresVeces(`Atención mamá, son las ${ev.horaV}. Tienes: ${ev.titulo}`);

},120000);

}

function cancelarAlarma(id){

if(alarmasActivas[id]){
clearInterval(alarmasActivas[id]);
delete alarmasActivas[id];
}

}

function repasarDia(dia){

const lista=(dia==='hoy'?eventosHoy:eventosManana);

if(lista.length===0) return hablar("Nada anotado.");

let t=(dia==='hoy'?"Hoy tienes: ":"Mañana tienes: ");

lista.forEach(ev=>{
t+=ev.horaVoz+", "+ev.titulo+". ";
});

hablar(t);

}

function verificarAlertas(){

const ahora=new Date();

const horaAhora=ahora.getHours();
const minAhora=ahora.getMinutes();

[eventosHoy,eventosManana].forEach(lista=>{

lista.forEach(ev=>{

const horaEv=ev.obj.getHours();
const minEv=ev.obj.getMinutes();

if(horaEv===horaAhora && minEv===minAhora && !idsAvisados.has(ev.id)){

idsAvisados.add(ev.id);

iniciarAlarma(ev);

}

});

});

}

</script>
</body>
</html>
