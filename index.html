<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario Mama</title>
    <style>
        :root { --hoy-bg: #FFEB3B; --manana-bg: #1A237E; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Arial Black', Gadget, sans-serif; overflow: hidden; background: #000; }
        
        .container { display: flex; height: 100vh; width: 100vw; }
        
        .col { 
            width: 50%; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            box-sizing: border-box;
            height: 100vh;
        }

        .col-hoy { background-color: var(--hoy-bg); color: #000; border-right: 5px solid #000; }
        .col-manana { background-color: var(--manana-bg); color: #FFF; }

        h1 { font-size: 3.5vh; margin: 5px 0; text-align: center; text-transform: uppercase; }
        
        .btn-repaso { 
            width: 100%; 
            padding: 15px; 
            font-size: 2.2vh; 
            font-weight: bold; 
            border-radius: 15px; 
            border: 3px solid #000; 
            margin-bottom: 10px;
            background: #fff;
            cursor: pointer;
            color: #000;
        }

        .lista-eventos { 
            flex-grow: 1; 
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow: hidden;
        }

        .evento { 
            background: white; 
            color: #000; 
            padding: 12px; 
            border-radius: 15px; 
            border: 4px solid #333; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            flex-shrink: 1;
            min-height: 0;
        }

        .evento h2 { margin: 0; color: #d32f2f; line-height: 1; font-size: 3.5vh; }
        .evento p { margin: 4px 0 0; font-weight: bold; line-height: 1.1; font-size: 4vh; }
        
        .urgente { border: 8px solid #ff0000; animation: blinker 1.5s linear infinite; }
        @keyframes blinker { 50% { border-color: transparent; } }
    </style>
</head>
<body>

<div class="container">
    <div class="col col-hoy">
        <h1 id="txt-hoy">HOY</h1>
        <button class="btn-repaso" onclick="repasarDia('hoy')">🔊 ESCUCHAR TODO HOY</button>
        <div id="lista-hoy" class="lista-eventos"></div>
    </div>

    <div class="col col-manana">
        <h1 id="txt-manana">MAÑANA</h1>
        <button class="btn-repaso" onclick="repasarDia('manana')" style="border-color: #FFF;">🔊 ESCUCHAR TODO MAÑANA</button>
        <div id="lista-manana" class="lista-eventos"></div>
    </div>
</div>

<script>
    // --- CONFIGURACIÓN ---
    const API_KEY = 'AIzaSyAtAuM4-eUL5JxWJTTfvOfIeSoohUzY0uQ'; 
    const CALENDAR_ID = 'https://calendar.google.com/calendar/embed?src=28451d471eac1ddfffe0b11721d46c8850993884a38c3cd8e0df6506848d8ae3%40group.calendar.google.com&ctz=Europe%2FMadrid';
    // ---------------------

    let eventosHoy = [];
    let eventosManana = [];

    function limpiarTexto(t) {
        return t.replace(/\*/g, '').replace(/\[ALERTA\]/gi, '').trim();
    }

    function horaNatural(fecha) {
        let h = fecha.getHours();
        let m = fecha.getMinutes();
        let period = h >= 12 ? 'de la tarde' : 'de la mañana';
        if (h > 12) h -= 12;
        if (h === 0) h = 12;
        let mins = m === 0 ? "" : " y " + m;
        return h + mins + " " + period;
    }

    function horaVisualLimpia(fecha) {
        let h = fecha.getHours();
        let m = fecha.getMinutes();
        if (h > 12) h -= 12;
        if (h === 0) h = 12;
        let mm = m < 10 ? '0' + m : m;
        return h + ':' + mm;
    }

    async function cargarCalendario() {
        const min = new Date(); min.setHours(0,0,0,0);
        const max = new Date(); max.setDate(min.getDate() + 2);
        const url = `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(CALENDAR_ID)}/events?key=${API_KEY}&timeMin=${min.toISOString()}&singleEvents=true&orderBy=startTime`;

        try {
            const r = await fetch(url);
            const d = await r.json();
            if(d.items) organizarEventos(d.items);
        } catch (e) { console.error("Error cargando Google Calendar:", e); }
    }

    function organizarEventos(items) {
        const hoyStr = new Date().toLocaleDateString();
        eventosHoy = []; eventosManana = [];

        items.forEach(item => {
            const inicio = new Date(item.start.dateTime || item.start.date);
            const ev = {
                titulo: limpiarTexto(item.summary || "Sin título"),
                horaV: horaVisualLimpia(inicio),
                horaVoz: horaNatural(inicio),
                obj: inicio,
                esAlerta: (item.summary || "").includes("*")
            };
            if (inicio.toLocaleDateString() === hoyStr) eventosHoy.push(ev);
            else eventosManana.push(ev);
        });
        dibujarYEscalar();
    }

    function dibujarYEscalar() {
        const opc = { weekday: 'long', day: 'numeric', month: 'long' };
        const d = new Date();
        document.getElementById('txt-hoy').innerText = "HOY: " + d.toLocaleDateString('es-ES', opc);
        d.setDate(d.getDate() + 1);
        document.getElementById('txt-manana').innerText = "MAÑANA: " + d.toLocaleDateString('es-ES', opc);

        renderLista(eventosHoy, 'lista-hoy');
        renderLista(eventosManana, 'lista-manana');

        ajustarTexto('lista-hoy');
        ajustarTexto('lista-manana');
    }

    function renderLista(lista, id) {
        const cont = document.getElementById(id);
        cont.innerHTML = "";
        const esManana = (id === 'lista-manana');

        lista.forEach(ev => {
            const div = document.createElement('div');
            div.className = "evento " + (ev.esAlerta ? 'urgente' : '');
            
            div.onclick = function() { 
                const prefijo = esManana ? "Mañana tienes a las " : "A las ";
                hablar(prefijo + ev.horaVoz + ", " + ev.titulo); 
            };
            
            div.innerHTML = `<h2>${ev.horaV}</h2><p>${ev.titulo}</p>`;
            cont.appendChild(div);
        });
    }

    function ajustarTexto(idContenedor) {
        const cont = document.getElementById(idContenedor);
        const eventos = cont.getElementsByClassName('evento');
        if (eventos.length === 0) return;

        let fontSizeP = 4; 
        let maxHeight = cont.clientHeight;

        while (cont.scrollHeight > maxHeight && fontSizeP > 1.5) {
            fontSizeP -= 0.1;
            for (let ev of eventos) {
                ev.querySelector('h2').style.fontSize = (fontSizeP * 0.8) + "vh";
                ev.querySelector('p').style.fontSize = fontSizeP + "vh";
            }
        }
    }

    function hablar(t) {
        window.speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(t);
        m.lang = 'es-ES';
        m.rate = 0.8;
        window.speechSynthesis.speak(m);
    }

    // --- SISTEMA DE ALARMA MEJORADO ---

    function sonarCampana(callback) {
        const context = new (window.AudioContext || window.webkitAudioContext)();
        const duration = 15; 
        const startTime = context.currentTime;

        for (let i = 0; i < duration; i += 1.5) {
            const osc = context.createOscillator();
            const gain = context.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(660, startTime + i);
            gain.gain.setValueAtTime(0, startTime + i);
            gain.gain.linearRampToValueAtTime(0.5, startTime + i + 0.1);
            gain.gain.exponentialRampToValueAtTime(0.01, startTime + i + 1);
            osc.connect(gain);
            gain.connect(context.destination);
            osc.start(startTime + i);
            osc.stop(startTime + i + 1);
        }
        setTimeout(callback, duration * 1000);
    }

    function hablarTriple(mensajeCompleto) {
        let veces = 0;
        function repetir() {
            if (veces < 3) {
                const m = new SpeechSynthesisUtterance(mensajeCompleto);
                m.lang = 'es-ES';
                m.rate = 0.8;
                m.onend = () => { veces++; setTimeout(repetir, 1500); };
                window.speechSynthesis.speak(m);
            }
        }
        repetir();
    }

    function repasarDia(dia) {
        const lista = dia === 'hoy' ? eventosHoy : eventosManana;
        if (lista.length === 0) return hablar("No tienes nada anotado.");
        let t = (dia === 'hoy' ? "Hoy tienes: " : "Mañana tienes: ");
        lista.forEach(ev => { t += `A las ${ev.horaVoz}, ${ev.titulo}. `; });
        hablar(t);
    }

    setInterval(() => {
        const ahora = new Date();
        eventosHoy.forEach(ev => {
            if (ev.esAlerta && ev.obj.getHours() === ahora.getHours() && ev.obj.getMinutes() === ahora.getMinutes() && ahora.getSeconds() < 2) {
                sonarCampana(() => {
                    hablarTriple(`Atención mamá. Es hora de: ${ev.titulo}`);
                });
            }
        });
    }, 1000);

    setInterval(cargarCalendario, 300000);
    window.onload = cargarCalendario;
</script>
</body>
</html>
