<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Calendario para Mamá</title>

<style>

:root{
--hoy-bg:#FFEB3B;
--manana-bg:#1A237E;
}

body,html{
margin:0;
padding:0;
height:100%;
font-family:'Arial Black',sans-serif;
overflow:hidden;
background:#000;
}

/* BARRA SUPERIOR */

#barra{
position:fixed;
top:0;
left:0;
width:100%;
background:#000;
color:#fff;
text-align:center;
padding:5px 0;
z-index:1000;
}

#fecha{font-size:2vh;}
#reloj{font-size:4vh;}

/* BOTON INICIO */

#btn-inicial{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
background:#ff0000;
color:white;
font-size:5vh;
font-weight:bold;
border:none;
z-index:9999;
}

/* CONTENEDOR */

.container{
display:none;
height:100vh;
width:100vw;
padding-top:70px;
box-sizing:border-box;
display:flex;
}

.col{
width:50%;
padding:5px;
display:flex;
flex-direction:column;
}

.col-hoy{
background:var(--hoy-bg);
border-right:3px solid #000;
}

.col-manana{
background:var(--manana-bg);
}

h1{
font-size:2.2vh;
margin:2px 0;
text-align:center;
color:#fff;
}

.btn-repaso{
width:100%;
padding:8px;
font-size:1.6vh;
font-weight:bold;
border-radius:8px;
border:2px solid #000;
margin-bottom:5px;
background:#fff;
cursor:pointer;
}

.lista-eventos{
flex-grow:1;
display:flex;
flex-direction:column;
gap:4px;
}

.evento{
background:#fff;
padding:7px;
border-radius:10px;
border:3px solid #333;
cursor:pointer;
color:#000;
}

.evento h2{
margin:0;
color:#d32f2f;
font-size:2.5vh;
}

.evento p{
margin:2px 0 0;
font-weight:bold;
font-size:2.8vh;
}

</style>
</head>

<body>

<div id="barra">
<div id="fecha"></div>
<div id="reloj"></div>
</div>

<button id="btn-inicial" onclick="iniciarSistema()">PULSA PARA ACTIVAR CALENDARIO Y SONIDO</button>

<div class="container">

<div class="col col-hoy">
<h1 id="titulo-hoy">HOY</h1>
<button class="btn-repaso" onclick="repasarDia('hoy')">🔊 TODO HOY</button>
<div id="lista-hoy" class="lista-eventos"></div>
</div>

<div class="col col-manana">
<h1 id="titulo-manana">MAÑANA</h1>
<button class="btn-repaso" onclick="repasarDia('manana')">🔊 TODO MAÑANA</button>
<div id="lista-manana" class="lista-eventos"></div>
</div>

</div>

<audio id="campana" src="campana.mp3"></audio>

<script>

const API_KEY='AIzaSyAtAuM4-eUL5JxWJTTfvOfIeSoohUzY0uQ';
const CALENDAR_ID='28451d471eac1ddfffe0b11721d46c8850993884a38c3cd8e0df6506848d8ae3@group.calendar.google.com';

let eventosHoy=[];
let eventosManana=[];
let alarmasActivas={};
let avisosPrevios=new Set();
let eventosSilenciados=new Set();

/* RELOJ */

function actualizarReloj(){

const ahora=new Date();

const fecha=ahora.toLocaleDateString('es-ES',{
weekday:'long',
day:'numeric',
month:'long'
}).toUpperCase();

let h=ahora.getHours();
let m=ahora.getMinutes();

if(h>12)h-=12;
if(h===0)h=12;

document.getElementById("fecha").innerText=fecha;
document.getElementById("reloj").innerText=h+":"+(m<10?"0"+m:m);

}

setInterval(actualizarReloj,1000);

/* AUDIO */

function hablar(t){
speechSynthesis.cancel();
const u=new SpeechSynthesisUtterance(t);
u.lang="es-ES";
u.rate=1.05;
speechSynthesis.speak(u);
}

function hablarTres(t){

let i=0;

function repetir(){

if(i>=3)return;

const u=new SpeechSynthesisUtterance(t);
u.lang="es-ES";
u.rate=1.05;

u.onend=()=>{i++;repetir();};

speechSynthesis.speak(u);

}

repetir();

}

/* CAMPANA */

function sonarCampana(){

const c=document.getElementById("campana");
c.currentTime=0;
c.play();

return new Promise(r=>setTimeout(r,10000));

}

/* INICIO */

function iniciarSistema(){

document.getElementById("btn-inicial").style.display="none";

if(document.documentElement.requestFullscreen)
document.documentElement.requestFullscreen();

document.querySelector(".container").style.display="flex";

hablar("Sistema activado");

cargarCalendario();

setInterval(cargarCalendario,60000);
setInterval(verificarAlertas,5000);

}

/* UTILIDADES */

function limpiarTexto(t){return t.replace(/\*/g,'').trim();}
function contarAsteriscos(t){let m=t.match(/^\*+/);return m?m[0].length:0;}

function horaVisual(d){

let h=d.getHours();
let m=d.getMinutes();

if(h>12)h-=12;
if(h===0)h=12;

return h+":"+(m<10?"0"+m:m);

}

function diaSemana(d){

return d.toLocaleDateString('es-ES',{weekday:'long'});

}

/* CALENDARIO */

async function cargarCalendario(){

const min=new Date();
min.setHours(0,0,0,0);

const url=`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(CALENDAR_ID)}/events?key=${API_KEY}&timeMin=${min.toISOString()}&singleEvents=true&orderBy=startTime&t=${Date.now()}`;

const r=await fetch(url);
const d=await r.json();

if(d.items)organizarEventos(d.items);

}

function organizarEventos(items){

const hoyStr=new Date().toLocaleDateString();
const manana=new Date();
manana.setDate(manana.getDate()+1);
const mananaStr=manana.toLocaleDateString();

eventosHoy=[];
eventosManana=[];

items.forEach(item=>{

const inicio=new Date(item.start.dateTime||item.start.date);

const ev={
id:item.id+inicio.getTime(),
titulo:limpiarTexto(item.summary||"Sin título"),
hora:inicio,
horaV:horaVisual(inicio),
dia:diaSemana(inicio),
asteriscos:contarAsteriscos(item.summary||"")
};

if(inicio.toLocaleDateString()===hoyStr)
eventosHoy.push(ev);
else if(inicio.toLocaleDateString()===mananaStr)
eventosManana.push(ev);

});

document.getElementById("titulo-hoy").innerText="HOY - "+diaSemana(new Date());

const m=new Date();
m.setDate(m.getDate()+1);
document.getElementById("titulo-manana").innerText="MAÑANA - "+diaSemana(m);

render();

}

function render(){

renderLista(eventosHoy,"lista-hoy","Hoy");
renderLista(eventosManana,"lista-manana","Mañana");

}

function renderLista(lista,id,textoDia){

const cont=document.getElementById(id);
cont.innerHTML="";

const ahora=new Date();

lista.forEach(ev=>{

const div=document.createElement("div");
div.className="evento";

div.innerHTML=`<h2>${ev.horaV}</h2><p>${ev.titulo}</p>`;

div.onclick=()=>{

eventosSilenciados.add(ev.id);

if(alarmasActivas[ev.id]){
clearInterval(alarmasActivas[ev.id]);
delete alarmasActivas[ev.id];
}

hablar(`${textoDia} ${ev.dia} a las ${ev.horaV} tienes ${ev.titulo}`);

};

cont.appendChild(div);

if(ahora>=ev.hora && !alarmasActivas[ev.id])
iniciarAlarma(ev,textoDia);

});

}

/* ALARMA EVENTO */

async function iniciarAlarma(ev,textoDia){

if(eventosSilenciados.has(ev.id))return;

await sonarCampana();

hablarTres(`${textoDia} ${ev.dia} a las ${ev.horaV} tienes ${ev.titulo}`);

/* recordatorio cada 2 minutos SIN campana */

alarmasActivas[ev.id]=setInterval(()=>{

if(eventosSilenciados.has(ev.id))return;

hablarTres(`${textoDia} ${ev.dia} a las ${ev.horaV} tienes ${ev.titulo}`);

},120000);

}

/* AVISOS ANTICIPADOS */

async function secuenciaAviso(ev,textoDia){

if(avisosPrevios.has(ev.id))return;

avisosPrevios.add(ev.id);

await sonarCampana();

hablarTres(`Recordatorio. ${textoDia} ${ev.dia} a las ${ev.horaV} tienes ${ev.titulo}`);

}

function verificarAlertas(){

const ahora=new Date();

[eventosHoy,eventosManana].forEach((lista,i)=>{

const textoDia=i===0?"Hoy":"Mañana";

lista.forEach(ev=>{

const diff=ev.hora-ahora;
const min=Math.floor(diff/60000);

if(ev.asteriscos===3 && min===180)
secuenciaAviso(ev,textoDia);

if(ev.asteriscos>=2 && min===120)
secuenciaAviso(ev,textoDia);

if(ev.asteriscos>=1 && min===60)
secuenciaAviso(ev,textoDia);

});

});

}

/* REPASO */

function repasarDia(dia){

const lista=(dia==="hoy"?eventosHoy:eventosManana);

const ahora=new Date();

const visibles=lista.filter(ev=>{
const fin=ev.hora.getTime()+3600000;
return ahora<fin;
});

if(visibles.length===0){
hablar("Nada anotado.");
return;
}

let t=(dia==="hoy"?"Hoy tienes: ":"Mañana tienes: ");

visibles.forEach(ev=>{
t+=ev.horaV+", "+ev.titulo+". ";
});

hablar(t);

}

</script>

</body>
</html>
