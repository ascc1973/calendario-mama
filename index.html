<style>
    /* ... (mantener estilos anteriores o usar estos mejorados) */
    .evento h2 { margin: 0; font-size: 2.2rem; color: #d32f2f; }
    .evento p { margin: 5px 0 0; font-size: 1.8rem; font-weight: bold; }
    
    /* Ajuste para que quepan más eventos */
    .lista-eventos { 
        flex-grow: 1; 
        overflow-y: auto; 
        padding-right: 10px;
    }
</style>

<script>
    // --- FUNCIÓN PARA FORMATO 12 HORAS ---
    function formatearHora12(fecha) {
        return fecha.toLocaleTimeString('es-ES', {
            hour: 'numeric',
            minute: '2-digit',
            hour12: true
        }).replace("am", "de la mañana").replace("pm", "de la tarde");
    }

    // --- FUNCIÓN PARA LIMPIAR EL TEXTO DEL ASTERISCO ---
    function limpiarTexto(texto) {
        // Elimina el asterisco y la palabra ALERTA para que no se lean
        return texto.replace(/\*/g, '').replace(/\[ALERTA\]/gi, '').trim();
    }

    function organizarEventos(items) {
        const hoy = new Date().toLocaleDateString();
        eventosHoy = [];
        eventosManana = [];

        items.forEach(item => {
            const inicio = new Date(item.start.dateTime || item.start.date);
            const tituloLimpio = limpiarTexto(item.summary);
            
            const evento = {
                titulo: tituloLimpio,
                // Guardamos la hora en formato 12h para la pantalla
                horaPantalla: inicio.toLocaleTimeString('es-ES', { hour: 'numeric', minute: '2-digit', hour12: true }),
                objetoFecha: inicio,
                esAlerta: item.summary.includes("[ALERTA]") || item.summary.includes("*")
            };

            if (inicio.toLocaleDateString() === hoy) {
                eventosHoy.push(evento);
            } else {
                eventosManana.push(evento);
            }
        });
        dibujarPantalla();
    }

    function hablar(texto) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(texto);
        msg.lang = 'es-ES';
        msg.rate = 0.8;
        window.speechSynthesis.speak(msg);
    }

    function renderLista(lista, idContenedor, diaTexto) {
        const contenedor = document.getElementById(idContenedor);
        contenedor.innerHTML = "";
        lista.forEach(ev => {
            const div = document.createElement('div');
            div.className = `evento ${ev.esAlerta ? 'urgente' : ''}`;
            // Al pulsar, lee la hora en formato natural y el título limpio
            div.onclick = () => hablar(`A las ${formatearHora12(ev.objetoFecha)}, ${ev.titulo}`);
            div.innerHTML = `<h2>${ev.horaPantalla}</h2><p>${ev.titulo}</p>`;
            contenedor.appendChild(div);
        });
    }

    function repasarDia(dia) {
        const lista = dia === 'hoy' ? eventosHoy : eventosManana;
        const nombreDia = dia === 'hoy' ? 'hoy' : 'mañana';
        
        if (lista.length === 0) return hablar(`No tienes nada anotado para ${nombreDia}`);
        
        let texto = `${dia === 'hoy' ? 'Hoy' : 'Mañana'} tienes: `;
        lista.forEach(ev => {
            texto += `A las ${formatearHora12(ev.objetoFecha)}, ${ev.titulo}. `;
        });
        hablar(texto);
    }

    // Alarma automática (también limpia el asterisco)
    setInterval(() => {
        const ahora = new Date();
        eventosHoy.forEach(ev => {
            if (ev.esAlerta && 
                ev.objetoFecha.getHours() === ahora.getHours() && 
                ev.objetoFecha.getMinutes() === ahora.getMinutes()) {
                hablar(`Atención mamá. Es hora de: ${ev.titulo}`);
            }
        });
    }, 60000);
</script>
