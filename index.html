<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Calendario para Mamá</title>

<style>
:root { --hoy-bg:#FFEB3B; --manana-bg:#1A237E; }

body,html{
  margin:0;
  padding:0;
  height:100%;
  font-family:'Arial Black', Gadget, sans-serif;
  overflow:hidden;
  background:#000;
}

#reloj{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  padding:5px;
  font-size:3vh;
  font-weight:bold;
  color:white;
  z-index:1000;
  text-align:center;
  background:rgba(0,0,0,0.6);
  line-height:1.2em;
  white-space:pre-line;
}

#btn-inicial{
  position:fixed;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  background:#ff0000;
  color:white;
  font-size:5vh;
  font-weight:bold;
  border:none;
  z-index:9999;
  cursor:pointer;
  text-transform:uppercase;
}

.container{
  display:flex;
  height:100vh;
  width:100vw;
  flex-direction:row;
  padding-top:10vh; /* espacio para reloj */
  box-sizing:border-box;
}

.col{
  width:50%;
  padding:5px;
  display:flex;
  flex-direction:column;
  box-sizing:border-box;
  height:100%;
}

.col-hoy{background-color:var(--hoy-bg);color:#000;border-right:3px solid #000;}
.col-manana{background-color:var(--manana-bg);color:#FFF;}

.col h1{
  font-size:2.2vh;
  margin:2px 0 8px 0; /* margen inferior para separar del reloj */
  text-align:center;
  text-transform:uppercase;
  white-space:nowrap;
  overflow:hidden;
}

.btn-repaso{
  width:100%;
  padding:8px 2px;
  font-size:1.6vh;
  font-weight:bold;
  border-radius:8px;
  border:2px solid #000;
  margin-bottom:5px;
  background:#fff;
  cursor:pointer;
  color:#000;
  flex-shrink:0;
  text-transform:uppercase;
}

.lista-eventos{
  flex-grow:1;
  display:flex;
  flex-direction:column;
  gap:4px;
  overflow:hidden;
}

.evento{
  background:white;
  color:#000;
  padding:7px;
  border-radius:10px;
  border:2.5px solid #333;
  display:flex;
  flex-direction:column;
  justify-content:center;
  flex-shrink:1;
  min-height:0;
  box-sizing:border-box;
  width:100%;
  cursor:pointer;
}

.evento h2{
  margin:0;
  color:#d32f2f;
  line-height:1;
  font-size:2.5vh;
}

.evento p{
  margin:2px 0 0;
  font-weight:bold;
  line-height:1.1;
  font-size:2.8vh;
  word-wrap:break-word;
}

.evento-ahora{
  transform:scale(1.15);
  border:4px solid #ff0000!important;
  background:#fff3cd;
}

.evento-proximo{
  border:3px solid #ff9800;
}

.tipo-medicina{background:#ffe5e5;}
.tipo-medico{background:#fff2cc;}
.tipo-familiar{background:#e5ffe5;}

.urgente-perma{
  border:2.5px solid #ff0000!important;
  animation:blinker-completo 1s linear infinite!important;
  background-color:#fff0f0;
}

@keyframes blinker-completo{
  0%{border-color:#ff0000;}
  50%{border-color:transparent;}
  100%{border-color:#ff0000;}
}

#status-dot{
  position:fixed;
  top:3px;
  right:3px;
  width:8px;
  height:8px;
  border-radius:50%;
  background:#4CAF50;
  z-index:1000;
  border:1px solid #000;
}
</style>
</head>

<body>

<div id="reloj"></div>

<button id="btn-inicial" onclick="iniciarApp()">PULSA PARA ACTIVAR CALENDARIO Y SONIDO</button>
<div id="status-dot"></div>

<div class="container">
  <div class="col col-hoy">
    <h1 id="txt-hoy">HOY</h1>
    <button class="btn-repaso" onclick="repasarDia('hoy')">🔊 TODO HOY</button>
    <div id="lista-hoy" class="lista-eventos"></div>
  </div>

  <div class="col col-manana">
    <h1 id="txt-manana">MAÑANA</h1>
    <button class="btn-repaso" onclick="repasarDia('manana')" style="border-color:#FFF;">🔊 TODO MAÑANA</button>
    <div id="lista-manana" class="lista-eventos"></div>
  </div>
</div>

<script>
const API_KEY='AIzaSyAtAuM4-eUL5JxWJTTfvOfIeSoohUzY0uQ';
const CALENDAR_ID='28451d471eac1ddfffe0b11721d46c8850993884a38c3cd8e0df6506848d8ae3@group.calendar.google.com';

let eventosHoy=[];
let eventosManana=[];
let audioContext;
let ultimoOK=Date.now();

function iniciarApp(){
  let elem=document.documentElement;
  if(elem.requestFullscreen)elem.requestFullscreen();

  audioContext=new(window.AudioContext||window.webkitAudioContext)();
  audioContext.resume();

  navigator.wakeLock?.request('screen');

  window.speechSynthesis.getVoices();

  hablar("Sistema activado");

  document.getElementById('btn-inicial').style.display='none';

  cargarCalendario();
}

function limpiarTexto(t){return t.replace(/\*/g,'').trim();}

function horaNatural(fecha){
  let h=fecha.getHours();
  let m=fecha.getMinutes();
  let period=h>=12?'de la tarde':'de la mañana';
  if(h>12)h-=12;
  if(h===0)h=12;
  return h+(m===0?"":" y "+m)+" "+period;
}

function horaVisual(fecha){
  let h=fecha.getHours();
  let m=fecha.getMinutes();
  if(h>12)h-=12;
  if(h===0)h=12;
  return h+':'+(m<10?'0'+m:m);
}

function detectarTipo(t){
  t=t.toLowerCase();
  if(t.includes("pastilla")||t.includes("medicina")||t.includes("insulina")) return "tipo-medicina";
  if(t.includes("médico")||t.includes("doctor")) return "tipo-medico";
  if(t.includes("hijo")||t.includes("familia")) return "tipo-familiar";
  return "";
}

async function cargarCalendario(){
  const min=new Date();
  min.setHours(0,0,0,0);
  const url=`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(CALENDAR_ID)}/events?key=${API_KEY}&timeMin=${min.toISOString()}&singleEvents=true&orderBy=startTime&t=${Date.now()}`;

  try{
    const r=await fetch(url,{cache:'no-store'});
    const d=await r.json();
    document.getElementById('status-dot').style.backgroundColor='#4CAF50';
    ultimoOK=Date.now();
    if(d.items)organizarEventos(d.items);
  }catch(e){
    document.getElementById('status-dot').style.backgroundColor='#F44336';
  }
}

function organizarEventos(items){
  const hoyStr=new Date().toLocaleDateString();
  eventosHoy=[];
  eventosManana=[];

  items.forEach(item=>{
    const sum=item.summary||"";
    const inicio=new Date(item.start.dateTime||item.start.date);
    const fin=new Date(item.end.dateTime||item.end.date);

    let antelacionHoras=0;
    if(sum.startsWith("***"))antelacionHoras=3;
    else if(sum.startsWith("**"))antelacionHoras=2;
    else if(sum.startsWith("*"))antelacionHoras=0;
    else antelacionHoras=-1;

    const ev={
      titulo:limpiarTexto(sum),
      horaV:horaVisual(inicio),
      horaVoz:horaNatural(inicio),
      obj:inicio,
      objFin:fin,
      antelacion:antelacionHoras,
      esAlerta:antelacionHoras>=0,
      tipo:detectarTipo(sum)
    };

    if(inicio.toLocaleDateString()===hoyStr)eventosHoy.push(ev);
    else eventosManana.push(ev);
  });

  dibujar();
}

function dibujar(){
  renderLista(eventosHoy,'lista-hoy','hoy');
  renderLista(eventosManana,'lista-manana','manana');
}

function renderLista(lista,id,diaClave){
  const cont=document.getElementById(id);
  cont.innerHTML="";
  const ahora=new Date();
  let proximo=null;
  const futuro=lista.filter(e=>e.obj>ahora);
  if(futuro.length){futuro.sort((a,b)=>a.obj-b.obj); proximo=futuro[0];}

  lista.forEach(ev=>{
    if(ahora>ev.objFin)return;
    const div=document.createElement('div');
    const ahoraMismo=ahora>=ev.obj && ahora<=ev.objFin;
    let mostrarUrgente=ev.esAlerta;

    div.className="evento "
      +(mostrarUrgente?'urgente-perma ':'')
      +(ahoraMismo?'evento-ahora ':'')
      +(proximo===ev?'evento-proximo ':'')
      +(ev.tipo);

    div.onclick=function(){
      const prefijo=(diaClave==='hoy'?"Hoy a las ":"Mañana a las ");
      hablar(prefijo+ev.horaVoz+", "+ev.titulo);
    };

    div.innerHTML=`<h2>${ev.horaV}</h2><p>${ev.titulo}</p>`;
    cont.appendChild(div);
  });
}

function hablar(t){
  window.speechSynthesis.cancel();
  const m=new SpeechSynthesisUtterance(t);
  m.lang='es-ES';
  m.rate=1.05;
  m.pitch=1;
  m.volume=1;
  window.speechSynthesis.speak(m);
}

function avisoEvento(ev){
  const mensaje=`Mamá. Son las ${ev.horaVoz}. Ahora toca ${ev.titulo}`;
  hablar(mensaje);
  setTimeout(()=>hablar("Recuerda "+ev.titulo),120000);
  setTimeout(()=>hablar("No olvides "+ev.titulo),300000);
}
function repasarDia(dia){
    let lista = dia === 'hoy' ? eventosHoy : eventosManana;
    if(!lista.length) {
        hablar("No hay eventos para " + dia);
        return;
    }

    // Filtramos eventos cuya fecha coincide exactamente con hoy o mañana
    const fechaHoy = new Date();
    if(dia === 'hoy'){
        lista = lista.filter(ev => ev.obj.toDateString() === fechaHoy.toDateString());
    } else {
        const fechaManana = new Date();
        fechaManana.setDate(fechaHoy.getDate() + 1);
        lista = lista.filter(ev => ev.obj.toDateString() === fechaManana.toDateString());
    }

    // Función recursiva para leer un evento tras otro sin cortarse
    let idx = 0;
    function leerSiguiente(){
        if(idx >= lista.length) return;
        const ev = lista[idx];
        idx++;
        const mensaje = `A las ${ev.horaVoz}, ${ev.titulo}`;
        const utter = new SpeechSynthesisUtterance(mensaje);
        utter.lang='es-ES';
        utter.rate = 1.05;
        utter.pitch = 1;
        utter.volume = 1;
        utter.onend = leerSiguiente; // llama al siguiente evento cuando termina
        window.speechSynthesis.speak(utter);
    }

    leerSiguiente();
}
setInterval(()=>{
  const ahora=new Date();
  const seg=ahora.getSeconds();
  const min=ahora.getMinutes();
  const hora=ahora.getHours();

  if(audioContext && audioContext.state==="suspended")audioContext.resume();

  eventosHoy.forEach(ev=>{
    if(!ev.esAlerta)return;
    const esHoraReal=(ev.obj.getHours()===hora && ev.obj.getMinutes()===min && seg===0);
    let esHoraAntelacion=false;
    if(ev.antelacion>0){
      const aviso=new Date(ev.obj.getTime()-(ev.antelacion*3600000));
      esHoraAntelacion=(aviso.getHours()===hora && aviso.getMinutes()===min && seg===0);
    }
    if(esHoraReal||esHoraAntelacion)avisoEvento(ev);
  });

  if(seg===0)dibujar();
},1000);

setInterval(cargarCalendario,300000);
setInterval(()=>{if(Date.now()-ultimoOK>900000)location.reload();},60000);
setInterval(()=>{if(window.speechSynthesis.speaking)window.speechSynthesis.cancel();},60000);
setInterval(()=>{document.body.style.opacity="0.99"; setTimeout(()=>document.body.style.opacity="1",50);},300000);

setInterval(()=>{
  const n=new Date();
  document.getElementById("reloj").innerText=
    n.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'}).toUpperCase()
    +"\n"+n.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
},1000);

setInterval(()=>{
  const ahora=new Date();
  if(ahora.getHours()===4 && ahora.getMinutes()===0 && ahora.getSeconds()===0)location.reload();
},1000);

window.onload=cargarCalendario;
</script>
</body>
</html>
