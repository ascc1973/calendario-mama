<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Calendario para Mamá</title>

<style>

:root{
--hoy-bg:#FFEB3B;
--manana-bg:#1A237E;
}

body,html{
margin:0;
padding:0;
height:100%;
font-family:'Arial Black',sans-serif;
overflow:hidden;
background:#000;
}

#btn-inicial{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
background:#ff0000;
color:white;
font-size:5vh;
font-weight:bold;
border:none;
z-index:9999;
cursor:pointer;
text-transform:uppercase;
}

.container{
display:none;
height:100vh;
width:100vw;
flex-direction:row;
}

.col{
width:50%;
padding:5px;
display:flex;
flex-direction:column;
box-sizing:border-box;
height:100vh;
}

.col-hoy{
background:var(--hoy-bg);
color:#000;
border-right:3px solid #000;
}

.col-manana{
background:var(--manana-bg);
color:#FFF;
}

h1{
font-size:2.2vh;
margin:2px 0;
text-align:center;
text-transform:uppercase;
}

.btn-repaso{
width:100%;
padding:8px 2px;
font-size:1.6vh;
font-weight:bold;
border-radius:8px;
border:2px solid #000;
margin-bottom:5px;
background:#fff;
cursor:pointer;
color:#000;
}

.lista-eventos{
flex-grow:1;
display:flex;
flex-direction:column;
gap:4px;
overflow:hidden;
}

.evento{
background:white;
color:#000;
padding:7px;
border-radius:10px;
border:3px solid #333;
display:flex;
flex-direction:column;
cursor:pointer;
}

.evento h2{
margin:0;
color:#d32f2f;
font-size:2.5vh;
}

.evento p{
margin:2px 0 0;
font-weight:bold;
font-size:2.8vh;
}

.urgente{
border:8px solid red !important;
animation:blink 0.8s linear infinite;
}

@keyframes blink{
0%{background:#00ff00;border-color:red;}
50%{background:white;border-color:white;}
100%{background:#00ff00;border-color:red;}
}

</style>
</head>

<body>

<button id="btn-inicial" onclick="iniciarSistema()">
PULSA PARA ACTIVAR CALENDARIO Y SONIDO
</button>

<div class="container">

<div class="col col-hoy">
<h1 id="txt-hoy">HOY</h1>
<button class="btn-repaso" onclick="repasarDia('hoy')">🔊 TODO HOY</button>
<div id="lista-hoy" class="lista-eventos"></div>
</div>

<div class="col col-manana">
<h1 id="txt-manana">MAÑANA</h1>
<button class="btn-repaso" onclick="repasarDia('manana')">🔊 TODO MAÑANA</button>
<div id="lista-manana" class="lista-eventos"></div>
</div>

</div>

<script>

 const API_KEY = 'AIzaSyAtAuM4-eUL5JxWJTTfvOfIeSoohUzY0uQ'; 
    const CALENDAR_ID = '28451d471eac1ddfffe0b11721d46c8850993884a38c3cd8e0df6506848d8ae3@group.calendar.google.com';


let eventosHoy=[];
let eventosManana=[];
let alarmasActivas={};
let eventosAtendidos=new Set();
let avisosPrevios=new Set();

function iniciarSistema(){

if(document.documentElement.requestFullscreen)
document.documentElement.requestFullscreen();

document.getElementById("btn-inicial").style.display="none";
document.querySelector(".container").style.display="flex";

hablar("Sistema activado");

cargarCalendario();

setInterval(verificarAlertas,5000);
setInterval(cargarCalendario,60000);

}

function limpiarTexto(t){
return t.replace(/\*/g,"").trim();
}

function contarAsteriscos(t){
let m=t.match(/^\*+/);
return m?m[0].length:0;
}

function horaVisual(d){
let h=d.getHours();
let m=d.getMinutes();
if(h>12)h-=12;
if(h===0)h=12;
return h+":"+(m<10?"0"+m:m);
}

function horaVoz(){
let d=new Date();
let h=d.getHours();
let m=d.getMinutes();
if(h>12)h-=12;
if(h===0)h=12;
return h+" y "+m;
}

async function cargarCalendario(){

const min=new Date();
min.setHours(0,0,0,0);

const url=`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(CALENDAR_ID)}/events?key=${API_KEY}&timeMin=${min.toISOString()}&singleEvents=true&orderBy=startTime&t=${Date.now()}`;

const r=await fetch(url);
const d=await r.json();

if(d.items)organizarEventos(d.items);

}

function organizarEventos(items){

const hoyStr=new Date().toLocaleDateString();

eventosHoy=[];
eventosManana=[];

items.forEach(item=>{

const inicio=new Date(item.start.dateTime||item.start.date);

const ev={
id:item.id+inicio.getTime(),
titulo:limpiarTexto(item.summary||"Sin título"),
horaV:horaVisual(inicio),
obj:inicio,
asteriscos:contarAsteriscos(item.summary||"")
};

if(inicio.toLocaleDateString()===hoyStr)
eventosHoy.push(ev);
else
eventosManana.push(ev);

});

renderLista(eventosHoy,"lista-hoy");
renderLista(eventosManana,"lista-manana");

}

function renderLista(lista,id){

const cont=document.getElementById(id);
cont.innerHTML="";

const ahora=new Date();

lista.forEach(ev=>{

const fin=ev.obj.getTime()+3600000;

if(ahora.getTime()>fin)return;

const activo=ahora>=ev.obj && ahora<=fin;

const div=document.createElement("div");

div.className="evento "+(activo?"urgente":"");

div.onclick=()=>{

speechSynthesis.cancel();

hablar(`Mamá hoy tienes a las: ${ev.horaV}. ${ev.titulo}`);

eventosAtendidos.add(ev.id);

if(alarmasActivas[ev.id]){
clearInterval(alarmasActivas[ev.id]);
delete alarmasActivas[ev.id];
}

};

div.innerHTML=`<h2>${ev.horaV}</h2><p>${ev.titulo}</p>`;

cont.appendChild(div);

if(activo && !alarmasActivas[ev.id])
iniciarAlarma(ev);

});

}

function hablar(t){

speechSynthesis.cancel();

const m=new SpeechSynthesisUtterance(t);
m.lang="es-ES";
m.rate=1.05;

speechSynthesis.speak(m);

}

function hablarTres(t){

let n=0;

function repetir(){

if(n>=3)return;

const m=new SpeechSynthesisUtterance(t);
m.lang="es-ES";

m.onend=()=>{n++;repetir();};

speechSynthesis.speak(m);

}

repetir();

}

function iniciarAlarma(ev){

const mensaje=()=>`Atención mamá. Son las ${horaVoz()}. ${ev.titulo}`;

if(!eventosAtendidos.has(ev.id))
hablarTres(mensaje());

alarmasActivas[ev.id]=setInterval(()=>{

if(!eventosAtendidos.has(ev.id))
hablarTres(mensaje());

},120000);

}

function secuenciaAviso(ev){

if(avisosPrevios.has(ev.id))return;

avisosPrevios.add(ev.id);

const msg=`Recordatorio. ${ev.titulo}`;

hablarTres(msg);
setTimeout(()=>hablarTres(msg),60000);
setTimeout(()=>hablarTres(msg),120000);

}

function verificarAlertas(){

const ahora=new Date();

[eventosHoy,eventosManana].forEach(lista=>{

lista.forEach(ev=>{

const diff=ev.obj.getTime()-ahora.getTime();
const min=Math.floor(diff/60000);

if(ev.asteriscos===2 && (min===120 || min===60))
secuenciaAviso(ev);

if(ev.asteriscos===3 && (min===180 || min===120 || min===60))
secuenciaAviso(ev);

if(Math.abs(diff)<60000 && !alarmasActivas[ev.id])
iniciarAlarma(ev);

});

});

}

function repasarDia(dia){

const lista=(dia==="hoy"?eventosHoy:eventosManana);

const ahora=new Date();

const eventosValidos=lista.filter(ev=>{
const fin=ev.obj.getTime()+3600000;
return ahora.getTime()<fin;
});

if(eventosValidos.length===0){
hablar("Hoy no tienes nada apuntado.");
return;
}

let t=(dia==="hoy"?"Hoy tienes a las: ":"Mañana tienes a las: ");

eventosValidos.forEach(ev=>{
t+=ev.horaV+", "+ev.titulo+". ";
});

hablar(t);

}

</script>
</body>
</html>
